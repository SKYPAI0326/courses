<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站內搜尋｜弄一下工作室</title>
<meta name="description" content="一次搜尋弄一下工作室全部課程頁，快速找到講義、單元、實例演練。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="弄一下工作室">
<meta property="og:title" content="站內搜尋｜弄一下工作室">
<meta property="og:description" content="一次搜尋弄一下工作室全部課程頁，快速找到講義、單元、實例演練。">
<meta property="og:url" content="https://skypai0326.github.io/courses/search.html">
<meta property="og:image" content="https://skypai0326.github.io/courses/素材/og-default.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="站內搜尋｜弄一下工作室">
<meta name="twitter:description" content="一次搜尋弄一下工作室全部課程頁，快速找到講義、單元、實例演練。">
<meta name="twitter:image" content="https://skypai0326.github.io/courses/素材/og-default.png">
<link rel="canonical" href="https://skypai0326.github.io/courses/search.html">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--c-bg:#f5f3ee;--c-surface:#edeae3;--c-card:#ffffff;--c-border:#d8d4cb;--c-text:#2c2b28;--c-muted:#7a766d;--c-a1:#b5703a;--c-a2:#c9963a;--c-a3:#5a7a5a;--c-a4:#6b7fa3;--c-a5:#7a9ea3;--radius:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--c-bg);color:var(--c-text);min-height:100vh;line-height:1.7;word-break:break-word;overflow-wrap:break-word;-webkit-text-size-adjust:100%;text-size-adjust:100%}
.skip-link{position:absolute;left:-9999px;top:0;z-index:100;background:var(--c-text);color:#fff;padding:10px 16px;border-radius:0 0 var(--radius) 0;font-size:.85rem;text-decoration:none}
.skip-link:focus{left:0}
a:focus-visible,button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--c-text);outline-offset:2px;border-radius:4px}
.topbar{position:sticky;top:0;z-index:50;height:56px;background:rgba(245,243,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-border);display:flex;align-items:center;padding:0 48px;gap:16px}
.logo{font-family:'Noto Serif TC',serif;font-weight:700;font-size:1.05rem;color:var(--c-text);letter-spacing:.05em;text-decoration:none}
.topbar-divider{width:1px;height:18px;background:var(--c-border)}
.topbar-sub{font-size:.8rem;color:var(--c-muted)}
.spacer{flex:1}
.topbar-home{font-size:.78rem;color:var(--c-muted);text-decoration:none;border:1px solid var(--c-border);padding:5px 14px;border-radius:var(--radius);background:var(--c-card)}
.topbar-home:hover{color:var(--c-text);border-color:var(--c-text)}
.hero{padding:64px 48px 32px;max-width:820px;margin:0 auto}
.hero-eyebrow{font-size:.73rem;color:var(--c-a1);letter-spacing:2px;font-weight:500;margin-bottom:10px}
.hero-title{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:700;line-height:1.3;color:var(--c-text);margin-bottom:10px}
.hero-desc{font-size:.9rem;color:var(--c-muted);line-height:1.8}
.search-wrap{max-width:820px;margin:0 auto;padding:0 48px}
.search-box{position:relative}
.search-input{width:100%;padding:18px 56px 18px 22px;background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);font-family:inherit;font-size:1rem;color:var(--c-text);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--c-a1)}
.search-icon{position:absolute;right:22px;top:50%;transform:translateY(-50%);color:var(--c-muted);font-size:1.1rem;pointer-events:none}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.filter-btn{font-size:.75rem;padding:6px 14px;border:1px solid var(--c-border);background:var(--c-card);color:var(--c-muted);border-radius:99px;cursor:pointer;font-family:inherit;transition:border-color .2s,color .2s}
.filter-btn:hover{color:var(--c-text)}
.filter-btn.active{color:var(--c-a1);border-color:var(--c-a1);background:rgba(181,112,58,.06)}
.hint{font-size:.78rem;color:var(--c-muted);margin-top:14px}
.results{max-width:820px;margin:0 auto;padding:32px 48px 64px}
.results-meta{font-size:.78rem;color:var(--c-muted);margin-bottom:16px}
.result-item{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:20px 24px;margin-bottom:10px;text-decoration:none;color:inherit;display:block;transition:border-color .2s,transform .15s}
.result-item:hover{border-color:var(--c-a1);transform:translateY(-1px)}
.result-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.result-course{font-size:.7rem;color:var(--c-a1);letter-spacing:1px;font-weight:500}
.result-type{font-size:.68rem;color:var(--c-muted);border:1px solid var(--c-border);padding:1px 8px;border-radius:99px}
.result-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:var(--c-text);line-height:1.5;margin-bottom:5px}
.result-desc{font-size:.85rem;color:var(--c-muted);line-height:1.7}
.result-title mark,.result-desc mark{background:rgba(201,150,58,.25);color:var(--c-text);padding:0 2px;border-radius:2px}
.empty{padding:60px 24px;text-align:center;color:var(--c-muted);font-size:.9rem}
.footer{border-top:1px solid var(--c-border);padding:24px 48px;display:flex;align-items:center;gap:16px;max-width:960px;margin:0 auto}
.footer-logo{font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;color:var(--c-muted)}
.footer-div{width:1px;height:14px;background:var(--c-border)}
.footer-note{font-size:.75rem;color:var(--c-muted)}
@media(max-width:600px){.topbar,.hero,.search-wrap,.results,.footer{padding-left:24px;padding-right:24px}.hero-title{font-size:1.45rem}}
</style>
</head>
<body>
<a href="#main" class="skip-link">跳至主要內容</a>

<header class="topbar">
  <a href="index.html" class="logo">弄一下工作室</a>
  <div class="topbar-divider"></div>
  <span class="topbar-sub">站內搜尋</span>
  <div class="spacer"></div>
  <a href="index.html" class="topbar-home">回首頁</a>
</header>

<main id="main">

<section class="hero">
  <div class="hero-eyebrow">SEARCH</div>
  <h1 class="hero-title">站內搜尋</h1>
  <p class="hero-desc">一次搜尋全部 10 門課程、353 頁講義與演練。輸入關鍵字即時過濾，支援中文字元搜尋。</p>
</section>

<section class="search-wrap">
  <div class="search-box">
    <input type="search" id="q" class="search-input" placeholder="輸入關鍵字，例如「GA4 事件」「n8n webhook」「Prompt」" autocomplete="off" autofocus>
    <span class="search-icon" aria-hidden="true">⌕</span>
  </div>
  <div class="filters" id="filters" role="group" aria-label="課程篩選">
    <button class="filter-btn active" data-course="">全部課程</button>
  </div>
  <p class="hint">小技巧：輸入 2 個字以上開始搜尋；支援「空格分隔多關鍵字」（AND 邏輯）。</p>
</section>

<section class="results" aria-live="polite">
  <div class="results-meta" id="meta">載入索引中…</div>
  <div id="list"></div>
</section>

</main>

<footer class="footer">
  <span class="footer-logo">弄一下工作室</span>
  <div class="footer-div"></div>
  <span class="footer-note">2026 春季</span>
</footer>

<script>
(function(){
  const TYPE_LABEL={root:'首頁',index:'課程總覽',module:'模組',lesson:'單元',prac:'實例演練',page:'頁面'};
  const $q=document.getElementById('q');
  const $list=document.getElementById('list');
  const $meta=document.getElementById('meta');
  const $filters=document.getElementById('filters');
  let DATA=[];
  let activeCourse='';

  function escHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function highlight(text,terms){
    let out=escHTML(text);
    terms.forEach(t=>{
      if(!t)return;
      const safe=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      out=out.replace(new RegExp(safe,'gi'),m=>'<mark>'+m+'</mark>');
    });
    return out;
  }

  function render(results,terms){
    if(!results.length){
      $list.innerHTML='<div class="empty">沒有找到相關頁面，換個關鍵字試試？</div>';
      $meta.textContent='0 筆結果';
      return;
    }
    $meta.textContent=`找到 ${results.length} 筆結果`;
    $list.innerHTML=results.slice(0,80).map(r=>`
      <a href="${r.url}" class="result-item">
        <div class="result-meta">
          <span class="result-course">${escHTML(r.course_label||'')}</span>
          <span class="result-type">${TYPE_LABEL[r.type]||r.type}</span>
        </div>
        <div class="result-title">${highlight(r.title,terms)}</div>
        <div class="result-desc">${highlight(r.desc||'（無摘要）',terms)}</div>
      </a>
    `).join('');
  }

  function search(){
    const raw=$q.value.trim();
    if(raw.length<2 && !activeCourse){
      $list.innerHTML='';
      $meta.textContent=`共 ${DATA.length} 頁，請輸入 2 個字以上開始搜尋`;
      return;
    }
    const terms=raw.toLowerCase().split(/\s+/).filter(Boolean);
    const pool=activeCourse?DATA.filter(r=>r.course===activeCourse):DATA;
    const results=pool.filter(r=>{
      if(!terms.length)return true;
      const hay=(r.title+' '+r.desc+' '+r.course_label).toLowerCase();
      return terms.every(t=>hay.includes(t));
    });
    render(results,terms);
  }

  function buildFilters(){
    const seen=new Map();
    DATA.forEach(r=>{if(r.course && !seen.has(r.course))seen.set(r.course,r.course_label)});
    seen.forEach((label,slug)=>{
      const btn=document.createElement('button');
      btn.className='filter-btn';
      btn.dataset.course=slug;
      btn.textContent=label;
      $filters.appendChild(btn);
    });
    $filters.addEventListener('click',e=>{
      const b=e.target.closest('.filter-btn');
      if(!b)return;
      activeCourse=b.dataset.course;
      $filters.querySelectorAll('.filter-btn').forEach(x=>x.classList.toggle('active',x===b));
      search();
    });
  }

  fetch('search-index.json',{cache:'default'})
    .then(r=>r.json())
    .then(d=>{
      DATA=d;
      buildFilters();
      $meta.textContent=`共 ${DATA.length} 頁，請輸入 2 個字以上開始搜尋`;
      // URL ?q=xxx 自動帶入
      const u=new URL(location.href);
      const q=u.searchParams.get('q');
      if(q){$q.value=q;search()}
    })
    .catch(err=>{
      $meta.textContent='索引載入失敗，請重新整理頁面';
      console.error(err);
    });

  let t;
  $q.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(search,120)});
  $q.addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(t);search()}});
})();
</script>
</body>
</html>
