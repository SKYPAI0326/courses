  //   gen140_artifact_prac1-1-prompt-builder  → PRAC1-1

  //   gen140_check_prac5-3-ic                 → PRAC5-3
  //   gen140_realtask_prac2-4-rt              → PRAC2-4
  function extractUnit(key) {
    // 去掉 gen140_ 前綴與類別前綴
    const m = key.match(/^gen140_(?:reflect|artifact|peer|check|evidence|recycle|realtask)_(?:[a-z-]*?)?(ch|prac)([0-9]+)-([0-9]+)/i);

    return (m[1].toUpperCase() === 'CH' ? 'CH' : 'PRAC') + m[2] + '-' + m[3];

    const u = extractUnit(k);
    if (u) readUnits.add(u);
    if (k.startsWith(LS.reflect) && v && v.length > 0) cReflect++;
    if (k.startsWith(LS.peer) && v === '1') cPeer++;

      (allTbd ? '待建（' + main.length + ' 單元）' : (read.length + ' / ' + main.length + ' 已讀（' + pct + '%）')) +
      '</span>' +
      '</div>' +
      '<div class="part-bar"><div class="part-bar-fill" style="width:' + pct + '%"></div></div>';
    partContainer.appendChild(pp);
  });

  // === 渲染 Part 矩陣 ===
  parts.forEach(function (p) {
    const main = CATALOG.filter(u => u.part === p && !u.extra);
    const extra = CATALOG.filter(u => u.part === p && u.extra);

    const h = document.createElement('h2');
    h.textContent = 'Part ' + p + '：' + partNames[p] + '（' + main.length + ' 單元）';
    matrix.appendChild(h);

    if (main.length === 0) return;
    const grid = document.createElement('div');
    grid.className = 'unit-grid';
    main.forEach(function (u) {
      const isRead = readUnits.has(u.num);
      const tag = u.built ? 'a' : 'div';
      const el = document.createElement(tag);
      el.className = 'unit' + (isRead ? ' read' : '') + (!u.built ? ' tbd' : '');
      if (u.built) el.href = u.file;
      const nameText = u.built ? u.name : '待建';
      el.innerHTML = '<span class="unit-num">' + u.num + (isRead ? ' ✓' : '') + '</span><span class="unit-name">' + nameText + '</span>';
      grid.appendChild(el);
    });
    matrix.appendChild(grid);

    // Part 5 自由演練庫獨立子區塊
    if (extra.length > 0) {
      const note = document.createElement('div');
      note.className = 'matrix-note';
      note.textContent = '── Part 5 · 自由演練庫（' + extra.length + ' 個小型工具，不計入主課 56）';
      matrix.appendChild(note);
      const grid2 = document.createElement('div');
      grid2.className = 'unit-grid';
      extra.forEach(function (u) {
        const isRead = readUnits.has(u.num);
        const el = document.createElement('a');
        el.className = 'unit' + (isRead ? ' read' : '');
        el.href = u.file;
        el.innerHTML = '<span class="unit-num">' + u.num + (isRead ? ' ✓' : '') + '</span><span class="unit-name">' + u.name + '</span>';
        grid2.appendChild(el);
      });
      matrix.appendChild(grid2);
    }
  });

  // === 匯出進度報告 .md ===
  document.getElementById('btn-export').onclick = function () {
    const date = new Date();
    let md = '# 我的 140h 課程學習進度\n\n';
    md += '_匯出時間：' + date.toLocaleString('zh-TW') + '_\n\n';
    md += '## 總覽\n\n';
    md += '- **主課單元已讀**：' + mainRead + ' / 56\n';
    md += '- **反思紀錄**：' + cReflect + ' 則\n';
    md += '- **作品集**：' + cPortfolio + ' 件\n';
    md += '- **同儕互動**：' + cPeer + ' 處\n';
    md += '- **講師檢核**：' + cInstructor + ' 處\n\n';

    parts.forEach(function (p) {
      const main = CATALOG.filter(u => u.part === p && !u.extra);
      const extra = CATALOG.filter(u => u.part === p && u.extra);
      const read = main.filter(u => readUnits.has(u.num));
      const built = main.filter(u => u.built);
      md += '## Part ' + p + '：' + partNames[p] + '\n\n';
      if (built.length > 0) {
        md += '_' + read.length + ' / ' + main.length + ' 已讀_\n\n';
      } else {
        md += '_待建_\n\n';
      }
      main.forEach(function (u) {
        const status = readUnits.has(u.num) ? '✓' : (u.built ? '○' : '·');
        md += '- ' + status + ' ' + u.num + '：' + u.name + (u.built ? '' : '（待建）') + '\n';
      });
      if (extra.length > 0) {
        md += '\n### Part 5 · 自由演練庫\n\n';
        extra.forEach(function (u) {
          const status = readUnits.has(u.num) ? '✓' : '○';
          md += '- ' + status + ' ' + u.num + '：' + u.name + '\n';
        });
      }
      md += '\n';
    });
    md += '---\n\n_說明：✓ 已讀 / ○ 未讀 / · 待建_\n';

    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '我的學習進度_' + date.toISOString().slice(0, 10) + '.md';
    a.click();
    URL.revokeObjectURL(a.href);
  };
})();
</script>
</body>
</html>
