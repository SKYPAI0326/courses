<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRAC 2-3 8頁提案簡報骨架產生器｜生成式AI職訓實務應用班</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#f5f3ee;--c-surface:#edeae3;--c-card:#ffffff;--c-border:#d8d4cb;
  --c-text:#2c2b28;--c-muted:#8c8880;--c-a4:#6b7fa3;--radius:6px;--radius-sm:4px;--content-w:860px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--c-bg);color:var(--c-text);font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.7}
.topbar{position:sticky;top:0;z-index:50;height:56px;background:rgba(245,243,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-border);display:flex;align-items:center;padding:0 48px;gap:16px}
.logo{font-family:'Noto Serif TC',serif;font-weight:700;font-size:1.05rem;color:var(--c-text);letter-spacing:.05em;text-decoration:none}
.topbar-divider{width:1px;height:18px;background:var(--c-border)}
.topbar-sub{font-size:.8rem;color:var(--c-muted)}
.spacer{flex:1}
.topbar-tag{font-size:.75rem;color:var(--c-a4);border:1px solid rgba(107,127,163,.3);background:rgba(107,127,163,.08);padding:3px 12px;border-radius:99px;font-weight:500}
.progress-strip{height:3px;background:var(--c-surface);position:sticky;top:56px;z-index:49}
.progress-fill{height:100%;background:var(--c-a4);width:0%;transition:width .1s}
.page-hero{max-width:var(--content-w);margin:0 auto;padding:56px 48px 40px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--c-muted);text-decoration:none;margin-bottom:28px}
.back-link:hover{color:var(--c-a4)}
.hero-eyebrow{font-size:.7rem;color:var(--c-a4);letter-spacing:2px;font-weight:500;margin-bottom:10px}
.page-title{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:700;line-height:1.3;color:var(--c-text);margin-bottom:12px}
.page-subtitle{font-size:.93rem;color:var(--c-muted);line-height:1.85;max-width:580px}
.tool-wrap{max-width:var(--content-w);margin:0 auto;padding:0 48px 80px}
.step-label{font-size:.7rem;color:var(--c-muted);letter-spacing:2px;font-weight:500;margin-bottom:10px;margin-top:28px}

/* Input form */
.input-panel{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.field-row.full{grid-template-columns:1fr}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:.75rem;color:var(--c-muted);font-weight:500;letter-spacing:.5px}
.field-input{background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:9px 12px;font-size:.87rem;color:var(--c-text);font-family:'Noto Sans TC',sans-serif;transition:border-color .2s}
.field-input:focus{outline:none;border-color:rgba(107,127,163,.6)}
.field-input::placeholder{color:var(--c-muted);opacity:.7}
textarea.field-input{min-height:80px;resize:vertical;line-height:1.7}

/* Style presets */
.style-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.style-chip{font-size:.78rem;color:var(--c-muted);border:1px solid var(--c-border);background:var(--c-card);padding:5px 14px;border-radius:99px;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif}
.style-chip.active{border-color:var(--c-a4);color:var(--c-a4);background:rgba(107,127,163,.08)}

/* Action bar */
.action-bar{display:flex;gap:10px;margin-bottom:28px}
.btn-gen{background:var(--c-a4);color:#fff;border:none;padding:11px 28px;border-radius:var(--radius);font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .2s}
.btn-gen:hover{background:#5c6f91}
.btn-clear{background:transparent;color:var(--c-muted);border:1px solid var(--c-border);padding:11px 18px;border-radius:var(--radius);font-size:.88rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .2s}
.btn-clear:hover{background:var(--c-surface)}

/* Slide output */
.slides-output{display:none}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.output-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;color:var(--c-text)}
.output-actions{display:flex;gap:8px}
.out-btn{font-size:.78rem;color:var(--c-a4);border:1px solid rgba(107,127,163,.3);background:transparent;padding:5px 14px;border-radius:99px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .2s}
.out-btn:hover{background:rgba(107,127,163,.07)}
.slides-grid{display:flex;flex-direction:column;gap:12px}
.slide-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s}
.slide-card:hover{box-shadow:0 2px 12px rgba(107,127,163,.12)}
.slide-card-header{padding:10px 16px;background:rgba(107,127,163,.05);border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:12px}
.slide-num{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:var(--c-a4);opacity:.5;width:24px;flex-shrink:0}
.slide-page-title{font-size:.87rem;font-weight:700;color:var(--c-text)}
.slide-card-body{padding:14px 16px}
.slide-claim{font-size:.85rem;color:var(--c-a4);font-weight:500;margin-bottom:8px;line-height:1.6}
.slide-claim::before{content:'核心主張：';font-size:.72rem;color:var(--c-muted);font-weight:400;display:block;margin-bottom:2px}
.slide-points{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.slide-point{font-size:.82rem;color:var(--c-text);display:flex;gap:8px;line-height:1.6}
.slide-point::before{content:'·';color:var(--c-a4);flex-shrink:0}
.slide-chart{font-size:.75rem;color:var(--c-muted);border:1px solid var(--c-border);padding:3px 10px;border-radius:99px;display:inline-block}
.slide-chart::before{content:'建議圖表：'}

/* Edit mode */
.slide-card-body .edit-area{width:100%;background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:.82rem;color:var(--c-text);font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:80px;line-height:1.7;display:none}

/* Examples */
.examples-label{font-size:.7rem;color:var(--c-muted);letter-spacing:2px;font-weight:500;margin:32px 0 10px}
.example-chips{display:flex;gap:8px;flex-wrap:wrap}
.example-chip{font-size:.78rem;color:var(--c-a4);border:1px solid rgba(107,127,163,.3);background:transparent;padding:5px 14px;border-radius:99px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .2s}
.example-chip:hover{background:rgba(107,127,163,.07)}

/* Toast */
.toast{position:fixed;bottom:32px;right:32px;background:#2c2b28;color:#f5f3ee;padding:10px 20px;border-radius:var(--radius);font-size:.83rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

/* Nav */
.nav-footer{max-width:var(--content-w);margin:0 auto;padding:0 48px 64px;display:flex;justify-content:space-between;align-items:center}
.nav-btn{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--c-a4);text-decoration:none;padding:10px 20px;border:1px solid rgba(107,127,163,.3);border-radius:var(--radius);transition:background .2s}
.nav-btn:hover{background:rgba(107,127,163,.07)}
.nav-btn.primary{background:var(--c-a4);color:#fff;border-color:var(--c-a4)}
.nav-btn.primary:hover{background:#5c6f91}
.footer{border-top:1px solid var(--c-border);padding:24px 48px;display:flex;align-items:center;gap:16px}
.footer-logo{font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;color:var(--c-muted)}
.footer-div{width:1px;height:14px;background:var(--c-border)}
.footer-note{font-size:.75rem;color:var(--c-muted)}
@media(max-width:640px){
  .topbar,.page-hero,.tool-wrap,.nav-footer,.footer{padding-left:24px;padding-right:24px}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="topbar">
  <a href="../index.html" class="logo">Codex Studio</a>
  <div class="topbar-divider"></div>
  <span class="topbar-sub">生成式AI職訓實務應用班</span>
  <div class="spacer"></div>
  <span class="topbar-tag">PRAC 2-3 · 2.5h</span>
</header>
<div class="progress-strip"><div class="progress-fill" id="prog"></div></div>

<div class="page-hero">
  <a href="PRAC2-2.html" class="back-link">← PRAC 2-2 會議紀錄轉待辦工具</a>
  <div class="hero-eyebrow">PRAC 2-3 · PART 2 建立文字與知識產能</div>
  <h1 class="page-title">8 頁提案簡報骨架產生器</h1>
  <p class="page-subtitle">輸入主題、問題、解方與目標聽眾，自動生成具有說服力架構的 8 頁簡報骨架——每頁都有核心主張、三個支撐點與建議圖表類型。</p>
</div>

<div class="tool-wrap">
  <!-- Input -->
  <div class="step-label">STEP 01 · 填寫提案基本資訊</div>
  <div class="input-panel">
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">提案主題</label>
        <input class="field-input" id="f-topic" type="text" placeholder="例：導入 AI 客服助手可行性評估">
      </div>
      <div class="field-group">
        <label class="field-label">目標聽眾</label>
        <input class="field-input" id="f-audience" type="text" placeholder="例：營運長、CFO">
      </div>
    </div>
    <div class="field-row full">
      <div class="field-group">
        <label class="field-label">背景問題（為什麼需要這份提案）</label>
        <textarea class="field-input" id="f-problem" placeholder="例：客服回應時間平均 4 小時，用戶滿意度連續三季下滑，人力成本持續增加"></textarea>
      </div>
    </div>
    <div class="field-row full">
      <div class="field-group">
        <label class="field-label">解決方案方向</label>
        <textarea class="field-input" id="f-solution" placeholder="例：在官方網站導入 AI 聊天機器人處理 FAQ，預計可自動處理 60% 常見問題"></textarea>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">預期成效</label>
        <input class="field-input" id="f-outcome" type="text" placeholder="例：回應時間縮短至 5 分鐘，滿意度提升 20%">
      </div>
      <div class="field-group">
        <label class="field-label">預算與時間（可選）</label>
        <input class="field-input" id="f-budget" type="text" placeholder="例：預算 15 萬，3 個月實施">
      </div>
    </div>
  </div>

  <div class="step-label">STEP 02 · 選擇簡報風格</div>
  <div class="style-chips" id="styleChips">
    <button class="style-chip active" onclick="selectStyle(this,'說服型')">說服型（重視主張與論證）</button>
    <button class="style-chip" onclick="selectStyle(this,'資訊型')">資訊型（重視數據與事實）</button>
    <button class="style-chip" onclick="selectStyle(this,'行動型')">行動型（重視決策與執行）</button>
  </div>

  <div class="action-bar" style="margin-top:20px;">
    <button class="btn-gen" onclick="generateSlides()">生成骨架</button>
    <button class="btn-clear" onclick="clearAll()">清除重填</button>
  </div>

  <!-- Output -->
  <div class="slides-output" id="slidesOutput">
    <div class="output-header">
      <span class="output-title" id="outputTitle"></span>
      <div class="output-actions">
        <button class="out-btn" onclick="copyAll()">複製全部</button>
        <button class="out-btn" onclick="exportMarkdown()">匯出 Markdown</button>
      </div>
    </div>
    <div class="slides-grid" id="slidesGrid"></div>
  </div>

  <!-- Examples -->
  <div class="examples-label">範本快填 · EXAMPLES</div>
  <div class="example-chips">
    <button class="example-chip" onclick="loadExample('ai-service')">AI 客服導入提案</button>
    <button class="example-chip" onclick="loadExample('remote-work')">遠端辦公政策提案</button>
    <button class="example-chip" onclick="loadExample('training')">員工培訓計畫提案</button>
  </div>
</div>

<div class="nav-footer">
  <a href="PRAC2-2.html" class="nav-btn">← PRAC 2-2 會議紀錄轉待辦</a>
  <a href="PRAC2-4.html" class="nav-btn primary">PRAC 2-4 文件分析工作流 →</a>
</div>

<footer class="footer">
  <span class="footer-logo">Codex Studio</span>
  <div class="footer-div"></div>
  <span class="footer-note">生成式AI職訓實務應用班</span>
</footer>

<div class="toast" id="toast"></div>

<script>
let currentStyle = '說服型';

function selectStyle(el, style) {
  document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentStyle = style;
}

// Slide templates for each style
const slideStructures = {
  '說服型': [
    { title: '問題的緊迫性', claimTpl: '現在正是解決[問題]的關鍵時刻', chartType: '趨勢折線圖 / 對比柱狀圖' },
    { title: '現況分析', claimTpl: '[問題]已造成可量化的負面影響', chartType: '數據儀表板 / 痛點矩陣' },
    { title: '根本原因', claimTpl: '問題的根源是[原因]，而非表面症狀', chartType: '魚骨圖 / 因果鏈' },
    { title: '解決方向', claimTpl: '[解方]是目前最具可行性的路徑', chartType: '方案比較表' },
    { title: '具體方案', claimTpl: '我們將分三步驟實現[解方]', chartType: '甘特圖 / 流程圖' },
    { title: '預期成效', claimTpl: '預計在[時間]內達到[成效]', chartType: 'ROI 計算表 / Before/After 對比' },
    { title: '執行計畫', claimTpl: '明確的時間線與資源需求讓計畫可信', chartType: '時程表 / 資源分配圖' },
    { title: '行動呼籲', claimTpl: '請批准[決策]讓我們立即推進', chartType: '決策樹 / 簡潔摘要卡' },
  ],
  '資訊型': [
    { title: '背景與脈絡', claimTpl: '了解[背景]是做出正確決策的前提', chartType: '時間軸 / 背景地圖' },
    { title: '數據現況', claimTpl: '數據清楚顯示[問題]的規模與趨勢', chartType: '多維度數據圖 / 熱力圖' },
    { title: '影響範圍', claimTpl: '[問題]影響的不只是[部門]，還有[相關方]', chartType: '影響力矩陣' },
    { title: '可選方案', claimTpl: '有三種可行方案，各有不同的成本效益結構', chartType: '方案比較表' },
    { title: '評估標準', claimTpl: '我們用[N]個維度評估各方案的優劣', chartType: '評分矩陣 / 雷達圖' },
    { title: '推薦方案', claimTpl: '依據評估，[方案]最符合當前需求', chartType: '決策矩陣' },
    { title: '實施路徑', claimTpl: '分階段推進可降低風險並確保成效', chartType: '路線圖' },
    { title: '結論與後續', claimTpl: '下一步需要[具體決策]才能推進', chartType: '摘要卡 / 行動清單' },
  ],
  '行動型': [
    { title: '一句話問題', claimTpl: '[問題]正在拖累我們的[關鍵指標]', chartType: '一頁數字 / 警示指標' },
    { title: '為什麼是現在', claimTpl: '不行動的成本每月增加[X]', chartType: '成本累積圖' },
    { title: '我們的選擇', claimTpl: '只有兩條路：行動或維持現狀', chartType: '路徑比較' },
    { title: '解方一句話', claimTpl: '[解方]在[時間]內解決[問題]', chartType: '方案卡片' },
    { title: '誰來做什麼', claimTpl: '三個角色、三個任務、清晰負責', chartType: 'RACI 表 / 責任矩陣' },
    { title: '第一個月', claimTpl: '前 30 天的行動最關鍵', chartType: '30 天計畫' },
    { title: '成功指標', claimTpl: '我們用這些數字衡量成功', chartType: 'KPI 儀表板' },
    { title: '現在就決定', claimTpl: '今天批准，下週啟動', chartType: '決策卡 / 下一步清單' },
  ],
};

function generateSlides() {
  const topic = document.getElementById('f-topic').value.trim();
  const audience = document.getElementById('f-audience').value.trim();
  const problem = document.getElementById('f-problem').value.trim();
  const solution = document.getElementById('f-solution').value.trim();
  const outcome = document.getElementById('f-outcome').value.trim();
  const budget = document.getElementById('f-budget').value.trim();

  if (!topic || !problem || !solution) {
    showToast('請填寫提案主題、背景問題與解決方案');
    return;
  }

  const structure = slideStructures[currentStyle];
  const slides = structure.map((s, i) => {
    let claim = s.claimTpl
      .replace('[問題]', problem.split('，')[0] || '現有問題')
      .replace('[解方]', solution.split('，')[0] || '提案方案')
      .replace('[成效]', outcome || '預期成效')
      .replace('[時間]', budget || '三個月')
      .replace('[背景]', topic)
      .replace('[具體決策]', '批准本提案')
      .replace('[X]', '可觀成本')
      .replace('[N]', '五')
      .replace('[方案]', solution.split('，')[0] || '本方案')
      .replace('[部門]', audience || '直接使用部門')
      .replace('[相關方]', '間接利害關係人')
      .replace('[原因]', '系統性結構問題')
      .replace('[關鍵指標]', '效率與滿意度')
      .replace('[X]', '顯著');

    const points = generatePoints(i, { topic, problem, solution, outcome, budget });
    return { num: i+1, title: s.title, claim, points, chart: s.chartType };
  });

  renderSlides(slides, topic);
}

function generatePoints(slideIdx, { topic, problem, solution, outcome, budget }) {
  const templates = [
    [`${problem.split('，')[0]}是目前最急迫的挑戰`, '外部環境正在加速這個問題', '不行動的機會成本持續累積'],
    ['現有數據顯示問題規模超出預期', '影響範圍涵蓋多個關鍵業務指標', '趨勢若持續將在下一季度惡化'],
    ['問題表象背後有更深層的結構性原因', '目前的應對方式治標不治本', '找到根本原因才能設計有效解方'],
    [`${solution.split('，')[0]}已在類似情境中被驗證有效`, '與現有流程的整合障礙低', '技術與人員準備度已就緒'],
    ['分三個階段逐步推進以控制風險', '每個階段都有清晰的完成標準', '建立快速回饋迴路以確保方向正確'],
    [outcome || '預計達成量化的核心指標改善', '效益在六個月內可見', `投資回報率預計達 ${budget ? '正報酬' : '顯著水準'}`],
    ['第一個月完成準備與系統整合', '第二個月進行試行與調整', '第三個月全面上線並追蹤成效'],
    ['批准本提案即可啟動執行', '延遲決策的成本高於行動風險', '我們已準備好在批准後立即推進'],
  ];
  return templates[slideIdx] || ['支撐點 A', '支撐點 B', '支撐點 C'];
}

function renderSlides(slides, topic) {
  const output = document.getElementById('slidesOutput');
  document.getElementById('outputTitle').textContent = `「${topic}」· 8 頁簡報骨架`;

  let html = '';
  for (const s of slides) {
    html += `
      <div class="slide-card">
        <div class="slide-card-header">
          <div class="slide-num">0${s.num}</div>
          <div class="slide-page-title">${escHtml(s.title)}</div>
        </div>
        <div class="slide-card-body">
          <div class="slide-claim">${escHtml(s.claim)}</div>
          <div class="slide-points">
            ${s.points.map(p => `<div class="slide-point">${escHtml(p)}</div>`).join('')}
          </div>
          <span class="slide-chart">${escHtml(s.chart)}</span>
        </div>
      </div>`;
  }

  document.getElementById('slidesGrid').innerHTML = html;
  output.style.display = 'block';
  output.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function clearAll() {
  ['f-topic','f-audience','f-problem','f-solution','f-outcome','f-budget'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('slidesOutput').style.display = 'none';
}

function copyAll() {
  const slides = document.querySelectorAll('.slide-card');
  let text = document.getElementById('outputTitle').textContent + '\n\n';
  slides.forEach(card => {
    const num = card.querySelector('.slide-num').textContent;
    const title = card.querySelector('.slide-page-title').textContent;
    const claim = card.querySelector('.slide-claim').textContent.replace('核心主張：','');
    const points = [...card.querySelectorAll('.slide-point')].map(p => '  · ' + p.textContent).join('\n');
    const chart = card.querySelector('.slide-chart').textContent;
    text += `頁 ${num} ${title}\n核心主張：${claim}\n${points}\n${chart}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => showToast('已複製全部骨架'));
}

function exportMarkdown() {
  const slides = document.querySelectorAll('.slide-card');
  let md = '# ' + document.getElementById('outputTitle').textContent + '\n\n';
  slides.forEach(card => {
    const num = card.querySelector('.slide-num').textContent;
    const title = card.querySelector('.slide-page-title').textContent;
    const claim = card.querySelector('.slide-claim').textContent.replace('核心主張：','').trim();
    const points = [...card.querySelectorAll('.slide-point')].map(p => '- ' + p.textContent).join('\n');
    const chart = card.querySelector('.slide-chart').textContent.replace('建議圖表：','').trim();
    md += `## 頁 ${num}：${title}\n\n**核心主張：** ${claim}\n\n${points}\n\n> 建議圖表：${chart}\n\n---\n\n`;
  });
  navigator.clipboard.writeText(md).then(() => showToast('已複製 Markdown 格式'));
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

  if (!d) return;
  document.getElementById('f-topic').value = d.topic;
  document.getElementById('f-audience').value = d.audience;
  document.getElementById('f-problem').value = d.problem;
  document.getElementById('f-solution').value = d.solution;
  document.getElementById('f-outcome').value = d.outcome;
  document.getElementById('f-budget').value = d.budget;
  // Select style
  document.querySelectorAll('.style-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.startsWith(d.style));
  });
  currentStyle = d.style;
  generateSlides();
}
