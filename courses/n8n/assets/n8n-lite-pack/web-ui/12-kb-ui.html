<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知識庫問答 · Lite Pack</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:#f5f3ee;color:#2c2b28;line-height:1.7;min-height:100vh;padding:48px 24px;word-break:break-word;overflow-wrap:break-word;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  .container{max-width:760px;margin:0 auto}
  .eyebrow{font-size:.72rem;color:#b5703a;letter-spacing:1.5px;font-weight:500;margin-bottom:10px}
  h1{font-family:'Shippori Mincho',serif;font-size:1.8rem;font-weight:700;border-bottom:1px solid #d8d4cb;padding-bottom:14px;margin-bottom:14px}
  .sub{color:#7a766d;font-size:.92rem;margin-bottom:32px}
  textarea{width:100%;min-height:110px;padding:14px 16px;border:1px solid #d8d4cb;border-radius:6px;font-size:1rem;font-family:inherit;background:#fff;color:#2c2b28;resize:vertical}
  textarea:focus{outline:none;border-color:#5a7a5a}
  .hint{font-size:.78rem;color:#bcb8ae;margin-top:6px}
  button{padding:11px 32px;background:#5a7a5a;color:white;border:none;border-radius:6px;cursor:pointer;font-size:.95rem;font-weight:500;margin-top:14px;font-family:inherit}
  button:hover{background:#4a6a4a}
  button:disabled{opacity:.5;cursor:not-allowed}
  .result{margin-top:36px;padding:24px;background:#fff;border:1px solid #e8e4da;border-radius:6px;display:none}
  .result.show{display:block}
  .result-q{font-size:.85rem;color:#7a766d;margin-bottom:12px;border-bottom:1px dashed #e8e4da;padding-bottom:10px}
  .result-a{font-size:.95rem;line-height:1.85}
  .sources{margin-top:24px;padding-top:16px;border-top:1px solid #e8e4da}
  .sources-label{font-size:.75rem;color:#b5703a;letter-spacing:1px;font-weight:600;margin-bottom:10px}
  .source-item{font-size:.82rem;color:#7a766d;line-height:1.7;margin-bottom:8px}
  .source-ref{display:inline-block;width:24px;height:24px;background:#edeae3;border-radius:50%;text-align:center;line-height:24px;font-size:.72rem;color:#5a7a5a;font-weight:600;margin-right:8px;font-family:'SF Mono',monospace}
  .source-file{font-weight:500;color:#2c2b28}
  .loading{color:#7a766d;font-style:italic}
  .error{color:#c14a3a;background:#faf0ee;padding:14px;border-radius:6px;border:1px solid #e8d4d0}
  .examples{margin-top:24px;display:flex;gap:8px;flex-wrap:wrap}
  .ex-chip{font-size:.78rem;color:#7a766d;border:1px solid #d8d4cb;background:#fff;padding:5px 12px;border-radius:99px;cursor:pointer;font-family:inherit}
  .ex-chip:hover{color:#5a7a5a;border-color:#5a7a5a}
  .footer{margin-top:48px;padding-top:24px;border-top:1px solid #e8e4da;font-size:.78rem;color:#bcb8ae;text-align:center}
</style>
</head>
<body>
<style id="_gs">
#_gate{position:fixed;inset:0;z-index:9999;background:#f5f3ee;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans TC',sans-serif}
#_gate-box{width:100%;max-width:340px;padding:48px 36px;background:#fff;border:1px solid #d8d4cb;border-radius:6px;text-align:center}
#_gate-title{font-family:'Noto Serif TC',serif;font-size:1.35rem;font-weight:700;color:#2c2b28;margin-bottom:8px}
#_gate-sub{font-size:.8rem;color:#8c8880;margin-bottom:28px;line-height:1.7}
#_gate-input{width:100%;padding:10px 14px;border:1px solid #d8d4cb;border-radius:6px;font-size:.95rem;font-family:inherit;background:#f5f3ee;color:#2c2b28;outline:none;text-align:center;letter-spacing:.15em;box-sizing:border-box}
#_gate-input:focus{border-color:#6b7fa3;background:#fff}
#_gate-btn{margin-top:12px;width:100%;padding:11px;background:#6b7fa3;color:#fff;border:none;border-radius:6px;font-size:.85rem;font-family:inherit;cursor:pointer;transition:background .2s}
#_gate-btn:hover{background:#5c6f91}
#_gate-err{font-size:.76rem;color:#b5703a;margin-top:10px;min-height:16px}
</style>
<div id="_gate">
  <div id="_gate-box">
    <div id="_gate-title">弄一下工作室</div>
    <div id="_gate-sub">課程專屬講義<br>請輸入課程密碼</div>
    <input id="_gate-input" type="password" placeholder="••••••••" autocomplete="off">
    <button id="_gate-btn" onclick="_gc()">進入課程</button>
    <div id="_gate-err"></div>
  </div>
</div>
<script>
(function(){const K='n8n_auth',H='825e2dce35d14124f94b648f6ab2ab60c9db1d8f393c2b61722fe02412b9a199';if(sessionStorage.getItem(K)==='1'){var g=document.getElementById('_gate');if(g)g.style.display='none';return}async function _gc(){var v=document.getElementById('_gate-input').value,buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)),hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');if(hex===H){sessionStorage.setItem(K,'1');document.getElementById('_gate').style.display='none'}else{document.getElementById('_gate-err').textContent='密碼錯誤，請再試一次'}}window._gc=_gc;document.getElementById('_gate-input').addEventListener('keydown',function(e){if(e.key==='Enter')_gc()})})()</script>


<div class="container">
  <div class="eyebrow">LITE PACK · #12</div>
  <h1>📚 知識庫問答</h1>
  <p class="sub">問問題，AI 從 <code style="background:#edeae3;padding:2px 6px;border-radius:3px;font-size:.85rem;">knowledge-docs/</code> 內的文件找答案 + 標來源。</p>

  <textarea id="q" placeholder="輸入你的問題..."></textarea>
  <p class="hint">Ctrl/Cmd + Enter 快速送出</p>

  <div class="examples">
    <button class="ex-chip" onclick="setQ('退款政策是什麼？')">退款政策是什麼？</button>
    <button class="ex-chip" onclick="setQ('n8n 跟 Make 差別？')">n8n 跟 Make 差別？</button>
    <button class="ex-chip" onclick="setQ('創辦人是誰？')">創辦人是誰？</button>
    <button class="ex-chip" onclick="setQ('A 公司的客戶案例？')">A 公司的客戶案例？</button>
  </div>

  <button id="askBtn" onclick="ask()">問</button>

  <div id="result" class="result"></div>

  <div class="footer">
    <strong>使用前確認</strong>：① 已跑過 Part A（建索引）② 此 workflow Active = ON（不然 webhook 不接受 production POST）<br>
    POST endpoint：<code>/webhook/kb-ask</code> · GET 此頁面：<code>/webhook/kb-ui</code>
  </div>
</div>

<script>
function setQ(s){document.getElementById('q').value=s;}
function escapeHtml(s){return String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]))}

async function ask(){
  const q=document.getElementById('q').value.trim();
  if(!q){return;}
  const btn=document.getElementById('askBtn');
  const result=document.getElementById('result');
  btn.disabled=true;btn.textContent='思考中...';
  result.classList.add('show');
  result.innerHTML='<div class="loading">查詢知識庫中...</div>';

  try{
    const r=await fetch('/webhook/kb-ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q})
    });
    if(!r.ok){throw new Error('HTTP '+r.status+' — 確認 #12 workflow Active = ON');}
    const data=await r.json();

    let html='<div class="result-q"><strong>Q：</strong>'+escapeHtml(data.question||q)+'</div>';
    html+='<div class="result-a">'+escapeHtml(data.answer||'無答覆').replace(/\n/g,'<br>')+'</div>';
    if(data.sources&&data.sources.length){
      html+='<div class="sources"><div class="sources-label">引用來源</div>';
      data.sources.forEach(s=>{
        html+='<div class="source-item"><span class="source-ref">'+s.ref+'</span><span class="source-file">'+escapeHtml(s.file)+'</span><br>';
        html+='<span style="margin-left:32px;color:#bcb8ae;">'+escapeHtml(s.snippet||'')+'</span></div>';
      });
      html+='</div>';
    }
    result.innerHTML=html;
  }catch(e){
    result.innerHTML='<div class="error"><strong>錯誤：</strong>'+escapeHtml(e.message)+'</div>';
  }
  btn.disabled=false;btn.textContent='問';
}

document.getElementById('q').addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ask();}
});
</script>
</body>
</html>
