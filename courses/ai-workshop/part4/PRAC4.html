<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRAC4 Part 4 帶走產出 — AI 實務全攻略</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c-accent:#6b7fa3;--c-accent-light:#e8ecf3;--c-text:#1a1a1a;--c-sub:#5a5a5a;--c-border:#d8dce6;--c-bg:#fafafa;--content-w:780px;--r:6px;font-size:16px}
body{font-family:'Noto Sans TC',sans-serif;color:var(--c-text);background:var(--c-bg);line-height:1.7}
.topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--c-border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-link{font-size:.85rem;color:var(--c-accent);text-decoration:none}
.back-link:hover{text-decoration:underline}
.topbar-title{font-size:.9rem;font-weight:500;color:var(--c-sub)}
.hero{background:var(--c-accent-light);border-bottom:1px solid var(--c-border);padding:40px 24px 32px}
.hero-inner{max-width:var(--content-w);margin:0 auto}
.prac-label{font-size:.75rem;font-weight:700;letter-spacing:.12em;color:var(--c-accent);text-transform:uppercase;margin-bottom:10px}
.hero h1{font-family:'Shippori Mincho',serif;font-size:1.8rem;font-weight:700;line-height:1.3;margin-bottom:10px}
.hero-desc{font-size:.95rem;color:var(--c-sub);max-width:540px;line-height:1.8}
.progress-summary{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.prog-dot{width:10px;height:10px;border-radius:50%;background:var(--c-border)}
.prog-dot.done{background:var(--c-accent)}
main{max-width:var(--content-w);margin:0 auto;padding:36px 24px 80px}
.task-block{margin-bottom:48px}
.task-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--c-accent)}
.task-num{width:32px;height:32px;border-radius:50%;background:var(--c-accent);color:#fff;font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-title{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:600}
/* chart builder */
.chart-builder{border:1px solid var(--c-border);border-radius:var(--r);padding:20px;background:#fff;display:flex;flex-direction:column;gap:14px}
.field-row{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:.82rem;font-weight:700;color:var(--c-sub)}
.field-row input,.field-row select,.field-row textarea{border:1px solid var(--c-border);border-radius:var(--r);padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;color:var(--c-text);background:#fff;width:100%}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{outline:none;border-color:var(--c-accent)}
.gen-btn{background:var(--c-accent);color:#fff;border:none;border-radius:var(--r);padding:11px 28px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .15s;align-self:flex-start}
.gen-btn:hover{opacity:.85}
.output-box{background:var(--c-bg);border:1px solid var(--c-border);border-radius:var(--r);padding:14px 16px;font-size:.88rem;font-family:monospace;white-space:pre-wrap;word-break:break-all;min-height:100px;color:#2a2a2a;line-height:1.7;display:none}
.copy-btn{background:#fff;color:var(--c-accent);border:1px solid var(--c-accent);border-radius:var(--r);padding:6px 16px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:6px;display:none}
.copy-btn:hover{background:var(--c-accent-light)}
/* asset items */
.asset-rows{display:flex;flex-direction:column;gap:10px}
.asset-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:center;border:1px solid var(--c-border);border-radius:var(--r);padding:10px 12px;background:#fff}
.asset-row input{border:1px solid var(--c-border);border-radius:4px;padding:7px 10px;font-size:.88rem;font-family:'Noto Sans TC',sans-serif;width:100%}
.asset-row input:focus{outline:none;border-color:var(--c-accent)}
.asset-row select{border:1px solid var(--c-border);border-radius:4px;padding:7px 8px;font-size:.85rem;font-family:'Noto Sans TC',sans-serif;background:#fff}
.add-row-btn{background:var(--c-accent-light);color:var(--c-accent);border:1px dashed var(--c-accent);border-radius:var(--r);padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:6px}
/* plan fields */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.plan-field{display:flex;flex-direction:column;gap:6px}
.plan-field label{font-size:.82rem;font-weight:700;color:var(--c-sub)}
.plan-field input,.plan-field textarea,.plan-field select{border:1px solid var(--c-border);border-radius:var(--r);padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;color:var(--c-text);background:#fff;width:100%}
.plan-field input:focus,.plan-field textarea:focus,.plan-field select:focus{outline:none;border-color:var(--c-accent)}
.plan-field.full{grid-column:1/-1}
/* nav */
.page-nav{display:flex;justify-content:space-between;align-items:center;padding:24px 0 0;border-top:1px solid var(--c-border);margin-top:16px}
.nav-btn{display:inline-flex;align-items:center;gap:6px;font-size:.9rem;color:var(--c-accent);text-decoration:none;font-weight:500}
.nav-btn:hover{text-decoration:underline}
@media(max-width:600px){.asset-row{grid-template-columns:1fr}.plan-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="../index.html" class="back-link">← 課程總覽</a>
    <span class="topbar-title">PRAC4 帶走產出</span>
  </div>
</div>

<div class="hero">
  <div class="hero-inner">
    <div class="prac-label">PRAC4 · 帶走產出</div>
    <h1>Part 4 帶走產出</h1>
    <p class="hero-desc">完成三項互動任務，帶走圖表 Prompt、AI 資產清單與個人四週落地計畫，作為課後行動的起點。</p>
    <div class="progress-summary" id="prog-dots">
      <div class="prog-dot" id="dot-1" title="任務1"></div>
      <div class="prog-dot" id="dot-2" title="任務2"></div>
      <div class="prog-dot" id="dot-3" title="任務3"></div>
    </div>
  </div>
</div>

<main>

  <!-- 任務 1：圖表 Prompt 生成器 -->
  <div class="task-block">
    <div class="task-header">
      <div class="task-num">1</div>
      <div class="task-title">圖表 Prompt 生成器</div>
    </div>
    <div class="chart-builder">
      <div class="field-row">
        <div class="field-label">圖表標題</div>
        <input type="text" id="chart-title" placeholder="例：上半年業績走勢" oninput="saveData()">
      </div>
      <div class="field-row">
        <div class="field-label">圖表類型</div>
        <select id="chart-type" onchange="saveData()">
          <option value="折線圖">折線圖（趨勢）</option>
          <option value="長條圖">長條圖（比較）</option>
          <option value="圓餅圖">圓餅圖（佔比）</option>
          <option value="散點圖">散點圖（相關性）</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field-label">X 軸資料（用頓號分隔）</div>
        <input type="text" id="chart-x" placeholder="例：1月、2月、3月、4月、5月、6月" oninput="saveData()">
      </div>
      <div class="field-row">
        <div class="field-label">Y 軸數值（用逗號分隔）</div>
        <input type="text" id="chart-y" placeholder="例：120, 145, 132, 168, 190, 175" oninput="saveData()">
      </div>
      <div class="field-row">
        <div class="field-label">Y 軸單位 / 說明</div>
        <input type="text" id="chart-unit" placeholder="例：萬元、人次、件數" oninput="saveData()">
      </div>
      <div class="field-row">
        <div class="field-label">互動功能需求（可選）</div>
        <input type="text" id="chart-interactive" placeholder="例：hover 顯示精確數值、可切換顯示/隱藏資料系列" oninput="saveData()">
      </div>
      <button class="gen-btn" onclick="generateChartPrompt()">生成圖表 Prompt</button>
      <div class="output-box" id="chart-output"></div>
      <button class="copy-btn" id="chart-copy" onclick="copyOutput('chart-output','chart-copy')">複製 Prompt</button>
    </div>
  </div>

  <!-- 任務 2：AI 資產清單 -->
  <div class="task-block">
    <div class="task-header">
      <div class="task-num">2</div>
      <div class="task-title">AI 資產清單</div>
    </div>
    <p style="font-size:.9rem;color:var(--c-sub);margin-bottom:14px;line-height:1.7">列出課程中建立或盤點的 AI 資產，記錄名稱、類型與存放位置。</p>
    <div class="asset-rows" id="asset-rows">
      <div class="asset-row">
        <input type="text" placeholder="資產名稱（如：週報摘要-prompt-v1）" oninput="saveData()">
        <select onchange="saveData()">
          <option value="Prompt">Prompt</option>
          <option value="HTML工具">HTML 工具</option>
          <option value="模板">模板</option>
          <option value="Profile">Profile</option>
          <option value="筆記">學習筆記</option>
        </select>
        <input type="text" placeholder="存放位置" style="max-width:160px" oninput="saveData()">
      </div>
    </div>
    <button class="add-row-btn" onclick="addAssetRow()">＋ 新增資產</button>
  </div>

  <!-- 任務 3：四週落地計畫 -->
  <div class="task-block">
    <div class="task-header">
      <div class="task-num">3</div>
      <div class="task-title">個人四週落地計畫</div>
    </div>
    <div class="plan-grid">
      <div class="plan-field">
        <label>第一週：我要用 AI 完成的任務</label>
        <input type="text" id="plan-w1" placeholder="例：用 AI 幫我草擬每週業績週報" oninput="saveData()">
      </div>
      <div class="plan-field">
        <label>最希望節省時間的工作</label>
        <input type="text" id="plan-timesave" placeholder="例：每週花在整理報告的 2 小時" oninput="saveData()">
      </div>
      <div class="plan-field full">
        <label>第二週：要優化的 Prompt 或工具</label>
        <input type="text" id="plan-w2" placeholder="例：優化週報 Prompt，讓輸出可以直接貼給主管" oninput="saveData()">
      </div>
      <div class="plan-field">
        <label>第三週：要擴展的兩個新場景</label>
        <textarea id="plan-w3" rows="3" placeholder="場景1：&#10;場景2：" oninput="saveData()"></textarea>
      </div>
      <div class="plan-field">
        <label>第四週：資產庫整理與下一個 90 天目標</label>
        <textarea id="plan-w4" rows="3" placeholder="整理計畫：&#10;90 天目標：" oninput="saveData()"></textarea>
      </div>
      <div class="plan-field full">
        <label>今天離開後的第一個行動（具體到明天幾點要做什麼）</label>
        <input type="text" id="plan-first" placeholder="例：明天早上 9 點，用週報 Prompt 草擬本週業績摘要" oninput="saveData()">
      </div>
    </div>
  </div>

  <nav class="page-nav">
    <a href="CH4-3.html" class="nav-btn">← CH4-3</a>
    <a href="WS4-A.html" class="nav-btn">WS4-A →</a>
  </nav>

</main>

<script>
const KEY='aiws-prac4';

function generateChartPrompt(){
  const title=document.getElementById('chart-title').value.trim()||'我的圖表';
  const type=document.getElementById('chart-type').value;
  const x=document.getElementById('chart-x').value.trim()||'（請填入X軸資料）';
  const y=document.getElementById('chart-y').value.trim()||'（請填入數值）';
  const unit=document.getElementById('chart-unit').value.trim();
  const interactive=document.getElementById('chart-interactive').value.trim();
  let prompt=`請用 HTML + Chart.js 建立一個${type}，規格如下：

圖表標題：「${title}」
X 軸資料：${x}
Y 軸數值：${y}`;
  if(unit) prompt+=`\nY 軸單位：${unit}`;
  if(interactive) prompt+=`\n互動功能：${interactive}`;
  prompt+=`\n\n請輸出單一 HTML 檔，Chart.js 用 CDN 引入，不需要其他外部套件。中文介面，UTF-8 編碼。`;
  const out=document.getElementById('chart-output');
  out.textContent=prompt;
  out.style.display='block';
  const copyBtn=document.getElementById('chart-copy');
  copyBtn.style.display='inline-block';
  updateDot(1);
  saveData();
}

function copyOutput(outputId,btnId){
  const text=document.getElementById(outputId).textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(btnId);
    const orig=btn.textContent;
    btn.textContent='已複製！';
    setTimeout(()=>{btn.textContent=orig;},1500);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    const btn=document.getElementById(btnId);
    btn.textContent='已複製！';setTimeout(()=>{btn.textContent='複製 Prompt';},1500);
  });
}

function addAssetRow(){
  const rows=document.getElementById('asset-rows');
  const row=document.createElement('div');
  row.className='asset-row';
  row.innerHTML=`<input type="text" placeholder="資產名稱" oninput="saveData()">
<select onchange="saveData()"><option>Prompt</option><option>HTML工具</option><option>模板</option><option>Profile</option><option>筆記</option></select>
<input type="text" placeholder="存放位置" style="max-width:160px" oninput="saveData()">`;
  rows.appendChild(row);
  updateDot(2);
  saveData();
}

function updateDot(n){
  document.getElementById('dot-'+n).classList.add('done');
}

function saveData(){
  try{
    const d={};
    ['chart-title','chart-x','chart-y','chart-unit','chart-interactive',
     'plan-w1','plan-timesave','plan-w2','plan-w3','plan-w4','plan-first'
    ].forEach(id=>{const el=document.getElementById(id);if(el)d[id]=el.value;});
    d['chart-type']=document.getElementById('chart-type').value;
    const out=document.getElementById('chart-output');
    d['chart-output']=out.textContent;
    d['chart-output-visible']=out.style.display;
    const rows=document.getElementById('asset-rows');
    const assetData=[];
    rows.querySelectorAll('.asset-row').forEach(row=>{
      const inputs=row.querySelectorAll('input');
      const sel=row.querySelector('select');
      assetData.push({name:inputs[0]?inputs[0].value:'',type:sel?sel.value:'',loc:inputs[1]?inputs[1].value:''});
    });
    d['assets']=assetData;
    const dots=['dot-1','dot-2','dot-3'].map(id=>document.getElementById(id).classList.contains('done'));
    d['dots']=dots;
    localStorage.setItem(KEY,JSON.stringify(d));
    checkAllDone();
  }catch(e){}
}

function checkAllDone(){
  const w1=document.getElementById('plan-w1').value.trim();
  const first=document.getElementById('plan-first').value.trim();
  if(w1&&first) updateDot(3);
}

function loadData(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY)||'{}');
    ['chart-title','chart-x','chart-y','chart-unit','chart-interactive',
     'plan-w1','plan-timesave','plan-w2','plan-w3','plan-w4','plan-first'
    ].forEach(id=>{const el=document.getElementById(id);if(el&&d[id])el.value=d[id];});
    if(d['chart-type']) document.getElementById('chart-type').value=d['chart-type'];
    if(d['chart-output']){
      const out=document.getElementById('chart-output');
      out.textContent=d['chart-output'];
      out.style.display=d['chart-output-visible']||'none';
      if(d['chart-output-visible']==='block') document.getElementById('chart-copy').style.display='inline-block';
    }
    if(d['assets']&&d['assets'].length){
      const rows=document.getElementById('asset-rows');
      rows.innerHTML='';
      d['assets'].forEach(a=>{
        const row=document.createElement('div');
        row.className='asset-row';
        row.innerHTML=`<input type="text" value="${a.name||''}" placeholder="資產名稱" oninput="saveData()">
<select onchange="saveData()"><option${a.type==='Prompt'?' selected':''}>Prompt</option><option${a.type==='HTML工具'?' selected':''}>HTML工具</option><option${a.type==='模板'?' selected':''}>模板</option><option${a.type==='Profile'?' selected':''}>Profile</option><option${a.type==='筆記'?' selected':''}>筆記</option></select>
<input type="text" value="${a.loc||''}" placeholder="存放位置" style="max-width:160px" oninput="saveData()">`;
        rows.appendChild(row);
      });
    }
    if(d['dots']) d['dots'].forEach((on,i)=>{if(on) document.getElementById('dot-'+(i+1)).classList.add('done');});
  }catch(e){}
}

loadData();
</script>
</body>
</html>
