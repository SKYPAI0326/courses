<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CH3 整合模擬測驗｜CCS 生成式AI研習</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#f5f3ee;--c-surface:#edeae3;--c-card:#ffffff;--c-border:#d8d4cb;
  --c-text:#2c2b28;--c-muted:#8c8880;
  --c-a1:#7a9ea3; /* CH3 accent 灰藍綠 */
  --c-correct:#5a7a5a;--c-wrong:#b5633a;
  --radius:6px;--radius-sm:4px;--content-w:820px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.8;}

/* ============ Top bar ============ */
.topbar{position:sticky;top:0;z-index:50;height:56px;background:rgba(245,243,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-border);display:flex;align-items:center;padding:0 48px;gap:16px;}
.logo{font-family:'Shippori Mincho',serif;font-weight:700;font-size:1.05rem;color:var(--c-text);text-decoration:none;letter-spacing:.05em;}
.topbar-divider{width:1px;height:18px;background:var(--c-border);}
.topbar-sub{font-size:.8rem;color:var(--c-muted);}
.spacer{flex:1;}
.topbar-tag{font-size:.75rem;color:var(--c-a1);border:1px solid rgba(122,158,163,.3);background:rgba(122,158,163,.07);padding:3px 12px;border-radius:99px;font-weight:500;}

/* ============ Section base ============ */
.section{display:none;}
.section.active{display:block;}

/* ============ Setup ============ */
.setup-hero{max-width:var(--content-w);margin:0 auto;padding:64px 48px 48px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--c-muted);text-decoration:none;margin-bottom:28px;}
.back-link:hover{color:var(--c-a1);}
.hero-meta{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.hero-part{font-size:.72rem;color:var(--c-muted);letter-spacing:1px;font-weight:500;}
.hero-dv{width:1px;height:14px;background:var(--c-border);}
.hero-num{font-size:.72rem;color:var(--c-a1);letter-spacing:1px;font-weight:500;}
.page-title{font-family:'Shippori Mincho',serif;font-size:2rem;font-weight:700;line-height:1.3;color:var(--c-text);margin-bottom:12px;}
.page-desc{font-size:.9rem;color:var(--c-muted);line-height:1.8;margin-bottom:40px;}

.setup-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:32px;margin-bottom:24px;}
.setup-label{font-size:.72rem;color:var(--c-a1);font-weight:700;letter-spacing:1.5px;margin-bottom:14px;}
.setup-title{font-family:'Shippori Mincho',serif;font-size:1.15rem;font-weight:700;margin-bottom:6px;color:var(--c-text);}
.setup-help{font-size:.8rem;color:var(--c-muted);margin-bottom:20px;}

.choice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.choice{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:14px 16px;border:1px solid var(--c-border);border-radius:var(--radius-sm);background:var(--c-bg);cursor:pointer;transition:all .2s;font-family:inherit;color:var(--c-text);text-align:left;}
.choice:hover{border-color:var(--c-a1);}
.choice.selected{border-color:var(--c-a1);background:rgba(122,158,163,.08);}
.choice-label{font-size:.88rem;font-weight:500;}
.choice-meta{font-size:.72rem;color:var(--c-muted);}

.start-btn{display:block;width:100%;padding:18px;background:var(--c-a1);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:.95rem;font-weight:500;letter-spacing:.05em;cursor:pointer;transition:opacity .2s;}
.start-btn:hover{opacity:.88;}
.start-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ============ Exam ============ */
.exam-header{position:sticky;top:56px;z-index:40;background:rgba(245,243,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-border);padding:14px 48px;display:flex;align-items:center;gap:24px;}
.exam-timer{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;color:var(--c-a1);min-width:70px;}
.exam-timer.warn{color:var(--c-wrong);}
.exam-progress{flex:1;display:flex;align-items:center;gap:10px;}
.exam-progress-bar{flex:1;height:4px;background:var(--c-surface);border-radius:2px;overflow:hidden;}
.exam-progress-fill{height:100%;background:var(--c-a1);width:0%;transition:width .2s;}
.exam-progress-text{font-size:.78rem;color:var(--c-muted);min-width:64px;text-align:right;}
.exam-submit{padding:8px 18px;background:var(--c-a1);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:opacity .2s;}
.exam-submit:hover{opacity:.88;}

.exam-body{max-width:var(--content-w);margin:0 auto;padding:40px 48px 80px;}

.eq{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:border-color .2s;}
.eq.answered{border-color:rgba(122,158,163,.35);}
.eq-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
.eq-num{font-size:.72rem;color:var(--c-a1);font-weight:700;letter-spacing:.5px;padding-top:4px;min-width:42px;}
.eq-zone{font-size:.68rem;color:var(--c-muted);background:var(--c-surface);padding:2px 8px;border-radius:99px;margin-left:auto;flex-shrink:0;}
.eq-q{font-size:.92rem;font-weight:500;color:var(--c-text);line-height:1.7;white-space:pre-line;}
.eq-opts{display:flex;flex-direction:column;gap:8px;padding-left:56px;}
.eq-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--c-border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;background:var(--c-bg);}
.eq-opt:hover{border-color:var(--c-a1);}
.eq-opt input{margin-top:4px;accent-color:var(--c-a1);flex-shrink:0;}
.eq-opt-text{font-size:.85rem;color:var(--c-text);line-height:1.55;}
.eq-opt.checked{border-color:var(--c-a1);background:rgba(122,158,163,.06);}

.eq-sub{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;margin-left:56px;}
.eq-sub-q{font-size:.85rem;color:var(--c-text);margin-bottom:10px;font-weight:500;line-height:1.6;}
.eq-sub-opts{display:flex;flex-wrap:wrap;gap:6px;}
.eq-sub-opt{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--c-border);border-radius:4px;background:var(--c-card);cursor:pointer;font-size:.78rem;color:var(--c-text);transition:all .15s;}
.eq-sub-opt:hover{border-color:var(--c-a1);}
.eq-sub-opt input{accent-color:var(--c-a1);}
.eq-sub-opt.checked{border-color:var(--c-a1);background:rgba(122,158,163,.1);color:var(--c-a1);font-weight:600;}

/* ============ Results ============ */
.results-hero{max-width:var(--content-w);margin:0 auto;padding:64px 48px 32px;text-align:center;}
.result-score-wrap{margin-bottom:32px;}
.result-score{font-family:'Shippori Mincho',serif;font-size:4.5rem;font-weight:700;line-height:1;color:var(--c-a1);}
.result-score-suffix{font-size:1.5rem;color:var(--c-muted);margin-left:4px;}
.result-verdict{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:700;margin-top:12px;}
.result-verdict.pass{color:var(--c-correct);}
.result-verdict.fail{color:var(--c-wrong);}
.result-meta{font-size:.85rem;color:var(--c-muted);margin-top:8px;}

.result-zones{max-width:var(--content-w);margin:0 auto;padding:0 48px 40px;}
.zones-title{font-size:.72rem;color:var(--c-a1);font-weight:700;letter-spacing:1.5px;margin-bottom:14px;}
.zones-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.zone-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:18px 20px;}
.zone-name{font-size:.78rem;color:var(--c-muted);margin-bottom:6px;}
.zone-score{font-family:'Shippori Mincho',serif;font-size:1.6rem;font-weight:700;color:var(--c-text);}
.zone-pct{font-size:.78rem;color:var(--c-muted);margin-left:4px;}
.zone-bar{height:4px;background:var(--c-surface);border-radius:2px;margin-top:10px;overflow:hidden;}
.zone-bar-fill{height:100%;background:var(--c-a1);transition:width .4s;}

.review-section{max-width:var(--content-w);margin:0 auto;padding:0 48px 40px;}
.review-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:14px;}
.review-title{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;color:var(--c-text);}
.review-toggle{padding:8px 16px;background:transparent;border:1px solid var(--c-border);border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;font-size:.8rem;color:var(--c-text);transition:border-color .2s;}
.review-toggle:hover{border-color:var(--c-a1);}

.review-list{display:none;}
.review-list.open{display:block;}
.review-item{background:var(--c-card);border:1px solid var(--c-border);border-left:3px solid var(--c-wrong);border-radius:var(--radius);padding:20px 22px;margin-bottom:12px;}
.review-num{font-size:.7rem;color:var(--c-wrong);font-weight:700;letter-spacing:.5px;margin-bottom:8px;}
.review-q{font-size:.88rem;color:var(--c-text);line-height:1.7;margin-bottom:14px;white-space:pre-line;font-weight:500;}
.review-ans{font-size:.8rem;color:var(--c-muted);margin-bottom:4px;}
.review-ans-correct{color:var(--c-correct);font-weight:600;}
.review-ans-user{color:var(--c-wrong);font-weight:600;}
.review-exp{background:var(--c-surface);border-left:3px solid var(--c-a1);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;font-size:.82rem;line-height:1.85;color:var(--c-text);white-space:pre-line;margin-top:12px;}

.results-actions{max-width:var(--content-w);margin:0 auto;padding:0 48px 80px;display:flex;gap:12px;}
.result-btn{flex:1;padding:16px;background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);font-family:inherit;font-size:.88rem;color:var(--c-text);cursor:pointer;transition:border-color .2s;text-decoration:none;text-align:center;}
.result-btn:hover{border-color:var(--c-a1);}
.result-btn.primary{background:var(--c-a1);color:#fff;border-color:var(--c-a1);}
.result-btn.primary:hover{opacity:.88;border-color:var(--c-a1);}

/* ============ Footer ============ */
.footer{border-top:1px solid var(--c-border);padding:24px 48px;display:flex;align-items:center;gap:16px;}
.footer-logo{font-family:'Shippori Mincho',serif;font-size:.9rem;font-weight:700;color:var(--c-muted);}
.footer-note{font-size:.75rem;color:var(--c-muted);}

@media(max-width:768px){
  .topbar{padding:0 16px;}.topbar-sub,.topbar-divider{display:none;}
  .setup-hero,.results-hero{padding:40px 20px 32px;}
  .setup-card{padding:24px 20px;}
  .exam-header{padding:12px 16px;gap:12px;}
  .exam-body{padding:24px 16px 60px;}
  .eq{padding:18px 16px;}
  .eq-opts,.eq-sub{padding-left:0;margin-left:0;}
  .result-zones,.review-section,.results-actions{padding-left:16px;padding-right:16px;}
  .results-actions{flex-direction:column;}
  .footer{padding:20px;}
}
</style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="../../index.html">弄一下工作室</a>
  <div class="topbar-divider"></div>
  <span class="topbar-sub">CCS 認證研習</span>
  <div class="spacer"></div>
  <span class="topbar-tag">CH 3</span>
</header>

<!-- ============ Section: Setup ============ -->
<section class="section active" id="sectionSetup">
  <div class="setup-hero">
    <a class="back-link" href="index.html">← 返回課程目錄</a>
    <div class="hero-meta">
      <span class="hero-part">Part 3 · 整合練習</span>
      <div class="hero-dv"></div>
      <span class="hero-num">CH 3</span>
    </div>
    <h1 class="page-title">整合模擬測驗</h1>
    <p class="page-desc">80 題完整題庫模擬，涵蓋四大考綱。可依需求選擇範圍與計時。作答完畢後提交，查看分區得分與錯題解析。</p>

    <div class="setup-card">
      <div class="setup-label">STEP 1 · 選擇考綱範圍</div>
      <div class="setup-title">要測驗的題目範圍</div>
      <div class="setup-help">選擇全部 80 題進行完整模擬，或針對單一考綱複習弱點。</div>
      <div class="choice-grid" id="rangeGrid">
        <button class="choice selected" data-range="all"><span class="choice-label">全部 80 題</span><span class="choice-meta">完整模擬</span></button>
        <button class="choice" data-range="1"><span class="choice-label">考綱一</span><span class="choice-meta">Q1–Q19 · 19 題</span></button>
        <button class="choice" data-range="2"><span class="choice-label">考綱二</span><span class="choice-meta">Q20–Q41 · 22 題</span></button>
        <button class="choice" data-range="3"><span class="choice-label">考綱三</span><span class="choice-meta">Q42–Q59 · 18 題</span></button>
        <button class="choice" data-range="4"><span class="choice-label">考綱四</span><span class="choice-meta">Q60–Q80 · 21 題</span></button>
      </div>
    </div>

    <div class="setup-card">
      <div class="setup-label">STEP 2 · 計時器設定</div>
      <div class="setup-title">是否啟用計時</div>
      <div class="setup-help">計時結束後系統會自動提交。未啟用計時可自由作答，不限時。</div>
      <div class="choice-grid" id="timerGrid">
        <button class="choice selected" data-timer="0"><span class="choice-label">不計時</span><span class="choice-meta">自由練習</span></button>
        <button class="choice" data-timer="30"><span class="choice-label">30 分鐘</span><span class="choice-meta">快速複習</span></button>
        <button class="choice" data-timer="60"><span class="choice-label">60 分鐘</span><span class="choice-meta">標準模擬</span></button>
        <button class="choice" data-timer="90"><span class="choice-label">90 分鐘</span><span class="choice-meta">寬鬆作答</span></button>
      </div>
    </div>

    <button class="start-btn" id="startBtn">開始測驗</button>
  </div>
</section>

<!-- ============ Section: Exam ============ -->
<section class="section" id="sectionExam">
  <div class="exam-header">
    <div class="exam-timer" id="examTimer">--:--</div>
    <div class="exam-progress">
      <div class="exam-progress-bar"><div class="exam-progress-fill" id="examProgressFill"></div></div>
      <div class="exam-progress-text" id="examProgressText">0 / 0</div>
    </div>
    <button class="exam-submit" id="submitBtn">提交</button>
  </div>
  <main class="exam-body" id="examBody">
    <!-- Questions rendered by JS -->
  </main>
</section>

<!-- ============ Section: Results ============ -->
<section class="section" id="sectionResults">
  <div class="results-hero">
    <div class="result-score-wrap">
      <span class="result-score" id="resultScore">0</span><span class="result-score-suffix">%</span>
      <div class="result-verdict" id="resultVerdict">—</div>
      <div class="result-meta" id="resultMeta">—</div>
    </div>
  </div>

  <div class="result-zones">
    <div class="zones-title">分區得分</div>
    <div class="zones-grid" id="zonesGrid">
      <!-- Zone cards rendered by JS -->
    </div>
  </div>

  <div class="review-section">
    <div class="review-head">
      <div class="review-title">錯題回顧</div>
      <button class="review-toggle" id="reviewToggle">展開查看</button>
    </div>
    <div class="review-list" id="reviewList">
      <!-- Wrong answers rendered by JS -->
    </div>
  </div>

  <div class="results-actions">
    <button class="result-btn primary" id="retryBtn">重新測驗</button>
    <a class="result-btn" href="index.html">返回課程目錄</a>
  </div>
</section>

<footer class="footer">
  <span class="footer-logo">弄一下工作室</span>
  <span class="footer-note">· CCS 生成式 AI 認證研習 · CH3 整合模擬測驗</span>
</footer>

<script src="questions-data.js"></script>
<script>
/* =========================================================
   State
========================================================= */
const state = {
  range: 'all',
  timerMinutes: 0,
  quiz: [],        // active question list
  answers: {},     // answers[qid] = string | string[]  (for group: answers[qid+'_'+subIdx])
  remaining: 0,    // seconds
  tick: null,
  startedAt: null
};

/* =========================================================
   Helpers
========================================================= */
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));

function showSection(id){
  $$('.section').forEach(el => el.classList.remove('active'));
  $(`#${id}`).classList.add('active');
  window.scrollTo({top:0, behavior:'instant'});
}

function isMulti(q){
  return typeof q.a === 'string' && q.a.includes(',');
}
function parseMulti(a){
  return a.split(',').map(s => s.trim()).sort();
}
function optLetter(i){ return String.fromCharCode(65 + i); }

/* =========================================================
   Setup
========================================================= */
$$('#rangeGrid .choice').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('#rangeGrid .choice').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.range = btn.dataset.range;
  });
});
$$('#timerGrid .choice').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('#timerGrid .choice').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.timerMinutes = parseInt(btn.dataset.timer, 10);
  });
});

$('#startBtn').addEventListener('click', startExam);

/* =========================================================
   Exam
========================================================= */
function startExam(){
  state.quiz = state.range === 'all'
    ? QUESTIONS.slice()
    : QUESTIONS.filter(q => q.zone === parseInt(state.range, 10));
  state.answers = {};
  state.startedAt = Date.now();

  renderQuestions();
  updateProgress();
  setupTimer();
  showSection('sectionExam');
}

function renderQuestions(){
  const body = $('#examBody');
  body.innerHTML = '';
  state.quiz.forEach(q => body.appendChild(renderOne(q)));
}

function renderOne(q){
  const wrap = document.createElement('article');
  wrap.className = 'eq';
  wrap.dataset.qid = q.id;

  // Head
  const head = document.createElement('div');
  head.className = 'eq-head';
  head.innerHTML = `
    <span class="eq-num">Q${q.id}</span>
    <span class="eq-q">${escape(q.q.replace(/^Q\d+\.\s*/, ''))}</span>
    <span class="eq-zone">考綱${['','一','二','三','四'][q.zone]}</span>
  `;
  wrap.appendChild(head);

  if (q.subs){
    q.subs.forEach((sub, idx) => wrap.appendChild(renderSub(q, sub, idx)));
  } else {
    wrap.appendChild(renderOpts(q));
  }
  return wrap;
}

function renderOpts(q){
  const box = document.createElement('div');
  box.className = 'eq-opts';
  const multi = isMulti(q);
  const inputType = multi ? 'checkbox' : 'radio';
  const name = `q_${q.id}`;
  q.opts.forEach((opt, i) => {
    const letter = opt.match(/^([A-E])\./)?.[1] || optLetter(i);
    const label = document.createElement('label');
    label.className = 'eq-opt';
    label.innerHTML = `<input type="${inputType}" name="${name}" value="${letter}"><span class="eq-opt-text">${escape(opt)}</span>`;
    const input = label.querySelector('input');
    input.addEventListener('change', () => {
      // Toggle checked visual
      box.querySelectorAll('.eq-opt').forEach(el => {
        const inp = el.querySelector('input');
        el.classList.toggle('checked', inp.checked);
      });
      // Store answer
      if (multi){
        const vals = Array.from(box.querySelectorAll('input:checked')).map(x => x.value).sort();
        state.answers[q.id] = vals;
      } else {
        state.answers[q.id] = input.value;
      }
      markAnswered(q);
      updateProgress();
    });
    box.appendChild(label);
  });
  return box;
}

function renderSub(q, sub, idx){
  const box = document.createElement('div');
  box.className = 'eq-sub';
  const title = document.createElement('div');
  title.className = 'eq-sub-q';
  title.textContent = sub.q;
  box.appendChild(title);

  const opts = document.createElement('div');
  opts.className = 'eq-sub-opts';

  const subKey = `${q.id}_${idx}`;
  const name = `q_${subKey}`;
  // Determine options: if sub has `options` use them; else OX
  const choices = sub.options
    ? sub.options.map(o => ({label:o, value:(o.match(/^([A-Z])/)?.[1] || o)}))
    : [{label:'O', value:'O'}, {label:'X', value:'X'}];

  choices.forEach(c => {
    const lab = document.createElement('label');
    lab.className = 'eq-sub-opt';
    lab.innerHTML = `<input type="radio" name="${name}" value="${c.value}"><span>${escape(c.label)}</span>`;
    lab.querySelector('input').addEventListener('change', e => {
      opts.querySelectorAll('.eq-sub-opt').forEach(el => {
        el.classList.toggle('checked', el.querySelector('input').checked);
      });
      state.answers[subKey] = e.target.value;
      markAnswered(q);
      updateProgress();
    });
    opts.appendChild(lab);
  });

  box.appendChild(opts);
  return box;
}

function markAnswered(q){
  const el = $(`.eq[data-qid="${q.id}"]`);
  if (!el) return;
  const done = q.subs
    ? q.subs.every((_, i) => state.answers[`${q.id}_${i}`] != null)
    : state.answers[q.id] != null && (!Array.isArray(state.answers[q.id]) || state.answers[q.id].length > 0);
  el.classList.toggle('answered', done);
}

function updateProgress(){
  const total = state.quiz.length;
  const done = state.quiz.filter(q => {
    if (q.subs) return q.subs.every((_, i) => state.answers[`${q.id}_${i}`] != null);
    const a = state.answers[q.id];
    return a != null && (!Array.isArray(a) || a.length > 0);
  }).length;
  $('#examProgressText').textContent = `${done} / ${total}`;
  $('#examProgressFill').style.width = (total ? done/total*100 : 0) + '%';
}

/* =========================================================
   Timer
========================================================= */
function setupTimer(){
  const el = $('#examTimer');
  if (state.tick){ clearInterval(state.tick); state.tick = null; }
  el.classList.remove('warn');
  if (state.timerMinutes === 0){
    el.textContent = '不計時';
    return;
  }
  state.remaining = state.timerMinutes * 60;
  renderTimer();
  state.tick = setInterval(() => {
    state.remaining--;
    renderTimer();
    if (state.remaining <= 0){
      clearInterval(state.tick); state.tick = null;
      submitExam();
    }
  }, 1000);
}

function renderTimer(){
  const el = $('#examTimer');
  const m = Math.floor(state.remaining/60), s = state.remaining%60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('warn', state.remaining <= 300);
}

/* =========================================================
   Submit & Results
========================================================= */
$('#submitBtn').addEventListener('click', () => {
  const total = state.quiz.length;
  const done = state.quiz.filter(q => {
    if (q.subs) return q.subs.every((_, i) => state.answers[`${q.id}_${i}`] != null);
    const a = state.answers[q.id];
    return a != null && (!Array.isArray(a) || a.length > 0);
  }).length;
  if (done < total && !confirm(`尚有 ${total - done} 題未作答，確定提交？`)) return;
  submitExam();
});

function isQuestionCorrect(q){
  if (q.subs){
    return q.subs.every((sub, i) => state.answers[`${q.id}_${i}`] === sub.a);
  }
  if (isMulti(q)){
    const correct = parseMulti(q.a);
    const given = state.answers[q.id];
    if (!Array.isArray(given)) return false;
    return given.length === correct.length && given.every((v,i) => v === correct[i]);
  }
  return state.answers[q.id] === q.a;
}

function submitExam(){
  if (state.tick){ clearInterval(state.tick); state.tick = null; }

  const correct = state.quiz.filter(isQuestionCorrect);
  const total = state.quiz.length;
  const pct = Math.round(correct.length / total * 100);
  const pass = pct >= 70;

  $('#resultScore').textContent = pct;
  const verdict = $('#resultVerdict');
  verdict.textContent = pass ? '通過' : '未通過';
  verdict.className = 'result-verdict ' + (pass ? 'pass' : 'fail');

  const elapsed = Math.round((Date.now() - state.startedAt) / 1000);
  const em = Math.floor(elapsed/60), es = elapsed%60;
  $('#resultMeta').textContent = `答對 ${correct.length} / ${total} 題 · 用時 ${em} 分 ${es} 秒 · 通過門檻 70%`;

  renderZones();
  renderReview();
  showSection('sectionResults');
}

function renderZones(){
  const grid = $('#zonesGrid');
  grid.innerHTML = '';
  const zoneNames = {1:'考綱一 · 方法論', 2:'考綱二 · 提示詞', 3:'考綱三 · 進階應用', 4:'考綱四 · 倫理法律'};
  [1,2,3,4].forEach(z => {
    const qs = state.quiz.filter(q => q.zone === z);
    if (!qs.length) return;
    const c = qs.filter(isQuestionCorrect).length;
    const p = Math.round(c / qs.length * 100);
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.innerHTML = `
      <div class="zone-name">${zoneNames[z]}</div>
      <div><span class="zone-score">${c}/${qs.length}</span><span class="zone-pct">${p}%</span></div>
      <div class="zone-bar"><div class="zone-bar-fill" style="width:${p}%"></div></div>
    `;
    grid.appendChild(card);
  });
}

function renderReview(){
  const list = $('#reviewList');
  list.innerHTML = '';
  const wrongs = state.quiz.filter(q => !isQuestionCorrect(q));
  if (!wrongs.length){
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--c-muted);font-size:.88rem;">全部答對，沒有錯題。</div>';
    return;
  }
  wrongs.forEach(q => list.appendChild(renderReviewItem(q)));
}

function renderReviewItem(q){
  const item = document.createElement('div');
  item.className = 'review-item';

  let userAnsText, correctAnsText;
  if (q.subs){
    correctAnsText = q.subs.map((s,i) => `第${i+1}題: ${s.a}`).join(' · ');
    userAnsText = q.subs.map((s,i) => `第${i+1}題: ${state.answers[`${q.id}_${i}`] ?? '未作答'}`).join(' · ');
  } else {
    correctAnsText = q.a;
    const u = state.answers[q.id];
    userAnsText = u == null ? '未作答' : (Array.isArray(u) ? u.join(', ') : u);
  }

  item.innerHTML = `
    <div class="review-num">Q${q.id} · 考綱${['','一','二','三','四'][q.zone]}</div>
    <div class="review-q">${escape(q.q)}</div>
    <div class="review-ans">正確答案：<span class="review-ans-correct">${escape(correctAnsText)}</span></div>
    <div class="review-ans">你的答案：<span class="review-ans-user">${escape(userAnsText)}</span></div>
    <div class="review-exp">${escape(q.exp)}</div>
  `;
  return item;
}

$('#reviewToggle').addEventListener('click', () => {
  const list = $('#reviewList');
  const open = list.classList.toggle('open');
  $('#reviewToggle').textContent = open ? '收合' : '展開查看';
});

$('#retryBtn').addEventListener('click', () => {
  showSection('sectionSetup');
});

/* =========================================================
   Utils
========================================================= */
function escape(s){
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
