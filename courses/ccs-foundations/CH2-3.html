const fill = document.getElementById('progressFill');
window.addEventListener('scroll', () => {

const QUESTIONS = [
  {id:'42',type:'group',q:'Q42. 針對為史密斯附近的大壩拆除專案建立無偏見的摘要，下列提示詞是否帶有偏見？有偏見為「O」，無偏見為「X」：',subs:[
    {q:'生成一個 150 字的摘要，內容關於大壩拆除的主要成就，重點關注對史密斯河附近的生態系統產生的最重大的影響。',a:'O'},
    {q:'建立一份摘要，內容關於史密斯河附近可能進行大壩拆除所帶來的影響，並包含公用事業公司提出的生態系統恢復建議。',a:'O'},
    {q:'生成一份摘要，內容關於獨立協力廠商研究中針對拆除大壩提供的建議，重點關注在史密斯河上實施該專案的可行性見解與潛在策略。',a:'X'}
  ],exp:'識別偏見是 AI 素養的關鍵。第一個選項僅關注「成就（Achievements）」，屬於選樣偏差（Selection Bias）。第二個選項僅採納「公用事業公司」的建議，該方通常是利益相關者，具有立場偏差。第三個選項引用「獨立第三方研究（Independent 3rd Party）」，並關注可行性與策略，這是最客觀中立的提示方式。'},
  {id:'43',q:'Q43. 你有一個橫條圖，該圖顯示了增加高脂肪食物攝入量和藥物用量增加之間的關係。哪個提示最能幫助你建立引人入勝的敘述內容，同時保留原始資料的含義？',opts:['A. 撰寫一個麵包師發現規律的故事，在故事中包括圖表中的資料，暗示高脂肪食物與藥物用量之間的關係。','B. 編寫橫條圖的摘要，其中包括所有技術術語，以及如果人類繼續保持相同的習慣可能會發生的後果。','C. 為醫院候診室編寫一本宣傳冊，用通俗的語言解釋橫條圖中呈現的資料，並提供範例。','D. 創作一首說唱歌曲，其中包含三段歌詞和一段副歌，說明健康飲食的重要性，及其對身體健康的影響。'],a:'B',exp:'數據敘事（Data Storytelling）的目標是將數據轉化為洞察。選項 B 是最佳解，因為它保留了數據的「技術術語（Fidelity）」，確保準確性，同時加入了「後果推論（Consequences）」，使內容具備行動啟發性。選項 A 的故事可能過度演繹，選項 C 過於通俗，選項 D 則完全娛樂化，損失了數據的嚴謹性。'},
  {id:'44',q:'Q44. Nicole 為她的高中英文課撰寫了一篇議論文，並將這篇文章上傳到生成式 AI 工具請求協助。她可以使用哪些提示詞來幫助她「編輯」作業？',opts:['A. 分析上傳文章，提供語法、標點、拼寫和大小寫方面的建議。','B. 分析上傳文章，提供有關的內容以及論證任務相符性的建議。','C. 寫一篇符合高中生風格的規範作文。','D. 撰寫一篇能夠在英語課上獲得高分的議論文。'],a:'A',exp:'在學術寫作中，AI 應作為「編輯（Editor）」而非「代筆者（Writer）」。選項 A 聚焦於語法、標點、拼寫等技術性編輯（Proofreading），這是最安全且能提升文章品質的方式。選項 C 與 D 則是要求 AI 直接寫作，屬於學術不端行為。'},
  {id:'45',q:'Q45. 你要建立一份銷售簡報，以探討消費者年齡和購買產品數量兩個變數之間的關聯。哪個提示詞最有可能生成恰當的資料視覺表示形式？',opts:['A. 建立一個散點圖，顯示特定產品的銷售量與消費者年齡之間的關係。','B. 說明一個圓形圖，顯示我公司去年銷售的最暢銷的產品。','C. 與橫條圖相比，使用長條圖來直觀顯示銷售資料有哪些好處？','D. 製作一個圖表，顯示特定產品的總銷售量。'],a:'A',exp:'這題涉及統計圖表的選擇。當需要探討「兩個連續變數（年齡 vs 購買量）」之間的「相關性（Correlation）」或分佈模式時，散點圖（Scatter Plot）是唯一正確的選擇。圓形圖用於比例，長條圖用於類別比較。透過散點圖，可以直觀看出某個年齡層是否購買力特別強。'},
  {id:'46',type:'group',q:'Q46. 下面這張散點圖包含一條趨勢線，顯示你的零售店的每週淨利潤。針對將圖表中的資料轉變為年終銷售現場會議所需的報告，下列提示詞能否撰寫所需報告？可以為「O」，不可以為「X」：',subs:[
    {q:'將散點圖資料轉變為公司年收入的直觀表示形式。',a:'X'},
    {q:'根據淨利潤資料設計一個宣傳傳單，重點介紹公司業績最好的幾週的情況。',a:'X'},
    {q:'製作一段敘述語音，說明全年淨利潤資料中顯示的主要趨勢和模式。',a:'X'},
    {q:'將每週淨利潤資料的格式轉換為季度報告，總結每個季度的總淨利潤和平均淨利潤。',a:'O'}
  ],exp:'這題測試的是 AI 處理數據結構的能力。選項 4 (O) 涉及數據的「重新採樣與彙整（Data Aggregation）」，AI 可以計算每週數據的平均值與總和，並轉化為高層級的決策報告。其他選項均存在邏輯缺陷：散點圖無法直接變為年收入（資訊不足）、傳單不等於報告、語音敘述不具備結構化報表的特徵。'},
  {id:'47',q:'Q47. Brianna 提供了提示詞「制定每週鍛煉計畫」，但 AI 生成的計畫因她的身體狀況和工作時間問題，無法按計畫進行鍛煉。她應如何改進提示詞？',opts:['A. Brianna 應提供自己的時間表，並說明她身體狀況面臨的限制。','B. Brianna 應重新輸入該提示詞，讓人工智慧（AI）再制定一個個性化的健身計畫。','C. Brianna 應要求人工智慧（AI）提供鍛煉和飲食建議。','D. Brianna 應盡可能嘗試執行人工智慧（AI）提供的計畫。'],a:'A',exp:'這題反映了生成式 AI 在處理「個人化需求」時的局限。初始提示詞是「零樣本（Zero-shot）」的請求，缺乏邊界條件。選項 A 提供了最重要的「約束條件（Constraints）」：時間表與身體限制，稱為「情境填充」。AI 需要精確的輸入參數才能輸出可執行的計畫。'},
  {id:'48',q:'Q48. 你一直使用同一對話生成所有社群媒體貼文，最新生成的一個貼文格式不符合預期，你希望它的格式與其他貼文的格式一致。你應該提供哪個後續提示詞？',opts:['A. 請修改貼文，使其看起來像之前生成的社群媒體貼文。','B. 這裡有一些來自其他使用者的同一個主題的社群媒體貼文。請重新生成貼文。','C. 這裡有一些我的朋友回覆之前貼文的螢幕截圖，請重試。','D. 你是否透過加入主題標籤（hashtags）與標記其他內容創作者的用戶標籤（usertags）來優化這個貼文的觸及率？'],a:'A',exp:'當 AI 生成的格式不符合預期，且對話中已有正確範例時，最有效的方法是「引用上下文（Referencing Context）」。選項 A 利用了 LLM 的「注意力機制（Attention Mechanism）」，讓它回顧對話歷史中的成功案例進行仿效。「同一個對話」內的參數權重是最高的，這比重新餵食其他使用者的資料更直接精確。'},
  {id:'49',q:'Q49. 你正在使用 AI 系統為科技部落格產生內容，初始回覆是「人工智慧領域近期的發展趨勢，大力推動優化機器學習演算法…」。你接下來應使用哪個提示詞來獲得更詳細、更有針對性的回覆？',opts:['A. 提供詳細的範例，說明最近在機器學習演算法方面的突破及其對汽車和金融行業的影響。','B. 概述過去一年中開發的最新 AI 助手的技術規範和硬體要求。','C. 總結 AI 從創始到現狀的歷史進程，重點介紹關鍵里程碑和數字。','D. 預測 AI 在未來十年中的發展趨勢，重點介紹它可能如何顛覆市場及其新的行業應用。'],a:'A',exp:'高品質的內容需要從「廣度」轉向「深度」。選項 A 是一種「深入鑽研（Drill-down）」的策略，要求 AI 針對初步回覆中的「機器學習突破」提供具體的「汽車與金融」範例。這是一種「遞迴檢索」的思維，能有效避免 AI 產生空洞的廢話，確保文章具備專業的洞察力。'},
  {id:'50',q:'Q50. 哪項定義正確地描述了提示詞鏈接（Prompt Chaining）技術？',opts:['A. 將任務劃分為更小的子任務並使用一個新提示詞的輸出作為下一個提示詞的輸入。','B. 提供若干範例，說明如何回答問題，並提供特定任務給人工智慧（AI）的行為。','C. 提供需要進行數值計算的問題，以及如何計算該問題的結果的範例，然後要求提供類似問題的結果。','D. 發出有關一個主題的指令詞，然後再發出有關另一個主題的提示詞。'],a:'A',exp:'提示詞鏈接（Prompt Chaining）的核心定義是：將一個複雜任務拆解成多個子任務，並將前一個步驟的輸出作為下一個步驟的輸入（選項 A）。這與 Few-shot Prompting（選項 B）或 Chain-of-Thought（選項 C）不同，鏈接是開發 AI Agent 或自動化工作流的基石，能突破模型單次生成的限制。'},
  {id:'51',type:'group',q:'Q51. 你建立大型語言模型的設定檔，該設定檔應套用一系列符合條件的問題，詢問用戶的心情和喜歡的音樂，並以此開始每次交互。對於每個指令，如果它能實現該目標，為「O」，不能實現為「X」：',subs:[
    {q:'隨機生成歌曲清單。',a:'X'},
    {q:'根據所在國家／地區當前最新熱門的 40 首歌，生成一系列相應的關於心情問題。這些問題應有以下幾類答案：「我覺得一樣」、「我覺得不一樣」或「這個問題與我無關」。',a:'O'},
    {q:'僅對以下問題提問並要求回覆 1、2、3、4 或 5，以 1 到 5 評分，5 是最高分：1. 你有多開心？ 2. 你有多喜歡流行音樂？ 3. 你有多喜歡古典音樂？',a:'O'}
  ],exp:'這題考驗的是「引導式對話（Guided Dialogue）」的設計。隨機生成（選項 1）不需要 AI 互動。高品質的系統設定應該透過「結構化提問」（選項 2）與「量化指標」（選項 3，Likert Scale）來挖掘用戶深層偏好。這種「先提問、後生成」的流程，能有效減少幻覺，確保播放清單具備高度的「個性化契合度」。'},
  {id:'52',q:'Q52. 你讓一個生成式 AI 聊天機器人列出第二次世界大戰中發生的關鍵事件及其日期。哪兩種方法可以很好地驗證這些資訊是否正確？',opts:['A. 在搜尋引擎中查找相關事件，並確認提供的日期是否相同。','B. 直接查看歷史書來確認二戰關鍵事件的日期。','C. 重新運行人工智慧（AI）請求，因為生成式 AI 具有隨機元素，然後確認提供的日期是否相同。','D. 讓另一個聊天機器人為你提供資訊並比較輸出。'],a:'A, D',exp:'面對客觀事實，必須具備「對抗式驗證」思維。搜尋引擎驗證（A）是基本的「外部接地（Grounding）」。跨模型驗證（D）則是利用「多代理人共識機制（Multi-Agent Consensus）」，若不同模型回答一致，正確率大幅提升。切記不可用同一個模型重新運行（C），因為它可能會犯同樣的邏輯錯誤。'},
  {id:'53',q:'Q53. 你要向非技術專業的受眾說明技術安全原則，想使用生成式 AI 將最近的安全性漏洞掃描報告轉換為適合該受眾的簡報。你應該使用哪個提示詞？',opts:['A. 使用較為簡單的語言重新編寫報告，並添加視覺輔助和範例。','B. 擴展安全掃描報告的技術詳細資訊。','C. 總結該報告的要點。','D. 提供針對安全掃描報告的詳細、批判性分析。'],a:'A',exp:'這是一種「語意翻譯（Semantic Translation）」任務。選項 A 掌握了核心：「簡化語言 + 視覺輔助 + 範例」。非技術受眾（如高層）需要知道的是「風險是什麼」，而非技術細節。AI 在此的角色是「解釋者（Explainer）」，透過類比將硬核指標轉化為決策參考。'},
  {id:'54',q:'Q54. 你想使用生成式 AI 將新員工手冊轉換為簡報。哪個提示詞最有可能生成促進學習的簡報？',opts:['A. 製作一個簡報，將內容轉換為吸引人且易於理解的格式。','B. 重新調整新員工手冊的格式，使用一致的幻燈片佈局製作一個簡報。','C. 製作一個新員工手冊，在手冊中包含相關圖像、圖表和圖形說明要點。','D. 根據新員工手冊製作一個簡報，重點關注公司的價值觀。'],a:'A',exp:'將手冊轉化為簡報時，重點在於「認知負荷（Cognitive Load）」的管理。選項 A 強調了「吸引人且易於理解」，這要求 AI 進行「內容重組」而非單純的格式調整（選項 B）。這不僅是格式轉化，更是內容的「教學法優化（Pedagogical Optimization）」。'},
  {id:'55',q:'Q55. 你要為小學課堂製作解釋光合作用的內容，結果對低齡受眾來說太過複雜。你如何才能優化結果，使其適合小學年齡段的受眾？',opts:['A. 重新為兒童目標受眾編輯內容。','B. 解釋得更簡單一點。','C. 避免使用嚴格的語言，並提供具體的範例。','D. 提供更簡短的解釋。'],a:'A',exp:'解釋複雜概念給小學生聽，需要 AI 具備「心智模型切換」的能力。選項 A 明確定義了「兒童目標受眾」，這在提示工程中稱為「角色與受眾設定（Role & Audience Priming）」。當受眾明確時，AI 會自動過濾專業術語並使用比喻（如植物的廚房），這比單純說「簡單一點」（選項 B）更有效。'},
  {id:'56',q:'Q56. 你在 AI 工具中輸入提示詞，總覽一個圖表顯示 2000 年至 2005 年期間西班牙和南非每年的人口。你希望在圖形中顯示兩國人口在歷史上持續發生的變化。你應該指定哪個附加提示詞？',opts:['A. 重新生成現有資料表示，將格式更改為折線圖。','B. 使用這些新的西班牙和南非人口預測資料，重新生成圖形。','C. 根據資料中的趨勢，預測這個橫條圖在未來幾年內會如何發生變化。','D. 使用圓形圖格式，重新生成現有資料表示。'],a:'A',exp:'要顯示數據隨時間的「持續變化（Historical Changes）」，折線圖（Line Chart）是最優選擇（選項 A）。折線圖能直觀展現斜率（增長速度）與趨勢。原圖的橫條圖適合比較絕對數值，圓形圖（選項 D）適合比例。這題考驗對「時序數據（Time-series Data）」合適呈現方式的認知。'},
  {id:'57',q:'Q57. 你在提示詞中提供了問答範例，範例中的答案不僅給出結果，還包含解釋邏輯（例如「根據色彩理論，將紅色和藍色按 2：1 混合…因為額外的紅色會在色輪上將色調變為更接近紅色…」）。你使用的是哪種類型的提示詞？',opts:['A. 思維鏈（CoT）','B. 零樣本學習','C. 少樣本學習 (Few-shot learning)','D. 自一性整理'],a:'A',exp:'這個範例展示了「思維鏈 (Chain of Thought, CoT)」的威力。提示詞中的範例答案不僅給出了結果，還包含了解釋邏輯（例如：因為額外的紅色…）。這稱為 Few-shot CoT，它不僅告訴 AI「答案是什麼」，更教會 AI「如何思考」，能顯著提升 AI 處理邏輯推理問題的準確度。'},
  {id:'58',q:'Q58. 你想使用反向提示詞（Reverse Prompting），讓 AI 為你生成包含適當細節的履歷。哪個提示詞最有助於實現此目標？',opts:['A. 讓我提供履歷所需的每個關鍵細節，然後使用這些資訊生成履歷。','B. 使用標準履歷範本，生成包含可信細節的履歷。','C. 我是一名具有 5 年經驗的英語老師，請為我撰寫一份履歷，用於申請一個教學崗位。','D. 我從事電腦銀行工作四年，負責為金融行業編寫 Python 程式。請為我撰寫一份履歷，用於申請一個更高級的職位。'],a:'A',exp:'這稱為「資訊收割法」或反向提示詞（Reverse Prompting）。選項 A 要求 AI 主動列出它需要哪些資訊（讓 AI 當面試官），而不是由用戶盲目提供。這能確保 AI 拿到的是真實且完整的資料，避免 AI 根據模糊標籤去「編造」專案，從而產出 100% 真實且具競爭力的履歷。'},
  {id:'59',q:'Q59. 某人工智慧（AI）工具提供了一個國家／地區的人口規模統計。你可以採取哪兩個步驟來驗證統計資訊的可靠性？',opts:['A. 交叉引用政府發佈的最新人口普查資料。','B. 檢查聯合國或世界銀行等國際組織提供的報告。','C. 使用包括預期人口統計趨勢的經濟預測。','D. 與享有聲譽的經濟研究機構提供的預測進行比較。','E. 查閱熱門新聞文章，瞭解這些新聞報導中是否提到了相似的人口趨勢。'],a:'A, B',exp:'驗證國家級統計數據必須回歸「第一手權威來源」。政府人口普查資料（A）是法律上的「地面真理（Ground Truth）」。國際組織報告（B，如聯合國、世界銀行）具備極高的學術參考價值與標準化校準。新聞文章（E）通常是二手資訊，容易有誤差。專業研究必須「溯源至官方機構」。'}
];

function renderOptions(opts, correctAns) {
  if (!opts) return '';
  const correctArr = correctAns.split(',').map(s=>s.trim().charAt(0));
  return opts.map(opt => {
    const letter = opt.trim().charAt(0);
    const isCorrect = correctArr.includes(letter);
    return `<div class="opt ${isCorrect?'correct':'wrong'}">
      <span class="opt-mark">${isCorrect?'✓':'·'}</span>
      <span class="opt-text">${opt}</span>
    </div>`;
  }).join('');
}

function renderSubs(subs) {
  return subs.map(s => `<div class="sub-q">
    <div class="sub-q-text">${s.q}</div>
    <div class="sub-opts">
      ${(s.options||['O','X']).map(o=>`<span class="sub-opt ${o===s.a||o.trim().charAt(0)===s.a?'correct':''}">${o} ${o===s.a||o.trim().charAt(0)===s.a?'✓':''}</span>`).join('')}
    </div>
    ${s.explanation?`<div style="font-size:.75rem;color:var(--c-muted);margin-top:6px;">${s.explanation}</div>`:''}
  </div>`).join('');
}

const container = document.getElementById('quizBody');
container.innerHTML = QUESTIONS.map((q,i) => `
  <div class="q-item" id="qi-${i}">
    <div class="q-header" onclick="toggle(${i})">
      <span class="q-num">${q.id}</span>
      <span class="q-text">${q.q}</span>
      <span class="q-toggle">▼</span>
    </div>
    <div class="q-body">
      ${q.type==='group' ? renderSubs(q.subs) : renderOptions(q.opts||[],q.a||'')}
      <div class="answer-badge">✓ 正確答案：${q.a||'見各子題'}</div>
      <div class="explanation">${q.exp}</div>
    </div>
  </div>
`).join('');

function toggle(i) {
  const el = document.getElementById('qi-'+i);
  el.classList.toggle('open');
}
</script>

<script>
// 閱讀進度持久化（localStorage）— 2026-04-16 UI refresh
(function(){
  var k='progress:'+location.pathname;
  var saved=parseInt(localStorage.getItem(k)||'0',10);
  if(saved>0){window.addEventListener('load',function(){window.scrollTo(0,saved);});}
  var t;
  window.addEventListener('scroll',function(){
    clearTimeout(t);
    t=setTimeout(function(){localStorage.setItem(k,String(window.scrollY));},200);
  },{passive:true});
})();
</script>
</body>
