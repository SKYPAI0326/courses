<script>
const fill = document.getElementById('progressFill');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = h.scrollTop / (h.scrollHeight - h.clientHeight) * 100;
  fill.style.width = Math.min(pct, 100) + '%';
});

const QUESTIONS = [
  {id:'20',type:'group',q:'Q20. 您正在開啟新產品的行銷活動…將每個提示詞類別與提示詞片段進行配對：',subs:[
    {q:'「你是一位在目標受眾領域有著豐富經驗的高級行銷經理」',options:['A. 生成式 AI 假定角色','B. 特定指令','C. 完整的提示詞上下文','D. 約束條件及舉例'],a:'A'},
    {q:'「根據客戶對新產品的喜好程度，為他們生成郵件」',options:['A. 生成式 AI 假定角色','B. 特定指令','C. 完整的提示詞上下文','D. 約束條件及舉例'],a:'B'},
    {q:'「我們需要為清單 [連結] 中的每個人生成電子郵件」',options:['A. 生成式 AI 假定角色','B. 特定指令','C. 完整的提示詞上下文','D. 約束條件及舉例'],a:'C'},
    {q:'「語態上應模仿一個有好消息要告訴你的摯友」',options:['A. 生成式 AI 假定角色','B. 特定指令','C. 完整的提示詞上下文','D. 約束條件及舉例'],a:'D'}
  ],exp:'高品質提示詞的四個關鍵要素：角色 (Role) 賦予身分；指令 (Instruction) 明確任務；上下文 (Context) 提供背景數據；約束條件 (Constraints) 規定語氣與限制。'},
  {id:'21',q:'Q21. Kenneth 想使用生成式 AI 制定度假計畫，旅程應包括：①美國西部遊玩十天 ②多個戶外自然景點 ③飛往景點區交通樞紐機場 ④租車遊覽景區。哪項提示詞最有可能生成合適的行程？',opts:['A. 制定一個為期十天的旅行行程，包括飛往距離其中一個景點相對較近的機場，並租車遊覽美國西部的多個著名景點。','B. 制定一個旅行行程，包括前往一個距離相對較近的機場，並租車遊覽美國西部的景觀。','C. 制定一個為期十天的旅行行程，包括租車遊覽美國的五個戶外景點，並飛往一個七月份通常不繁忙的城市機場。','D. 制定一個旅行行程，包括飛往美國西部並參觀當地的景點。'],a:'A',exp:'提示詞的「完整性」決定輸出品質。選項 A 完美覆蓋了所有維度：天數（10 天）、地點（美西）、活動（景點）與物流（機場與租車）。其他選項漏掉了天數或具體的物流需求，可能導致 AI 生成出不可執行的行程。'},
  {id:'22',q:'Q22. 哪兩個提示詞可以用於總結現有內容？',opts:['A. 「托爾金的《魔戒》的情節是什麼？請用 500 字概括。」','B. 「今天會議的主要議題是什麼？（並同時提供了會議記錄。）」','C. 「我將在邁阿密度假兩周，可以做哪些有趣的事？」','D. 「寫一首詩，詩的內容講的是一隻穿著紅馬甲的魔法兔子。」','E. 「使用 Python 生成一個程式，該程式通過詢問你的生日來告知你的年齡。」'],a:'A, B',exp:'「總結」任務的目的是壓縮資訊並保留重點。選項 A 屬於從訓練資料中提取精華（擷取式總結）；選項 B 屬於針對提供的上下文進行濃縮（會議摘要）。選項 C 是規劃，D 是創作，E 是程式編寫，均非總結。'},
  {id:'23',type:'group',q:'Q23. 你想用 AI 生成攀登吉力馬札羅山的計畫。請將有效提示詞的各部分配對正確選項：',subs:[
    {q:'我想：',options:['A. 飛往非洲','B. 登頂最大的山峰','C. 到訪坦尚尼亞','D. 攀登吉力馬札羅山'],a:'D'},
    {q:'查找：',options:['A. 最適合初學者的路線','B. 飛往非洲花費最少的航班','C. 花費最少的路線'],a:'A'},
    {q:'將旅行限制為：',options:['A. 直飛坦尚尼亞的班機','B. 飛往非洲最便宜的班機','C. 非洲的旱季','D. 僅限不下雨的日子'],a:'C'},
    {q:'選擇：',options:['A. 非洲所有優惠價格的導遊','B. 所有專業攀登吉力馬札羅山的價格實惠的導遊','C. 坦尚尼亞所有經濟實惠的導遊','D. 所有在旱季工作價格實惠的導遊'],a:'B'}
  ],exp:'這模擬了思維鏈（CoT）的建構過程：1. 明確目標（攀登吉力馬札羅山）；2. 針對痛點（初學者路線）；3. 環境約束（旱季，考量安全性）；4. 平衡預算與專業（專業且實惠的導遊）。'},
  {id:'24',type:'group',q:'Q24. 每個提示詞用於製作或轉換什麼樣的圖像？進行正確配對：',subs:[
    {q:'將附加照片製作成達芬奇的蒙娜麗莎風格的畫作',options:['A. 影像轉換','B. 探索一些藝術創想','C. 辨識影像的內容','D. 製作一個用於特定用途的影像'],a:'A'},
    {q:'繪製幾幅大灰狼參加考試的圖畫',options:['A. 影像轉換','B. 探索一些藝術創想','C. 辨識影像的內容','D. 製作一個用於特定用途的影像'],a:'B'},
    {q:'附加照片中是什麼內容？',options:['A. 影像轉換','B. 探索一些藝術創想','C. 辨識影像的內容','D. 製作一個用於特定用途的影像'],a:'C'},
    {q:'製作一個包含橘色大寫字母「P」的商標，並帶有凸顯綠色的漸層背景。',options:['A. 影像轉換','B. 探索一些藝術創想','C. 辨識影像的內容','D. 製作一個用於特定用途的影像'],a:'D'}
  ],exp:'影像轉換 (Style Transfer) 是改變風格；探索創想是利用潛在空間進行超現實發散；視覺理解 (VQA) 是分析內容；製作特定用途影像是針對商標等具體需求的設計。'},
  {id:'25',q:'Q25. Jasmine 要創立一家環保草坪服務公司，她輸入提示詞「為一家環保草坪服務公司製作一個商標 Logo。」Jasmine 應該增加哪個提示詞，來製作對受眾更有針對性的商標？',opts:['A. 添加一個有綠色青草、五顏六色的鮮花和蜜蜂的小院。','B. 這不是我所要做的，能否再建立一個？','C. 建立另一個包含更多內容的圖像。','D. 這是一台不對的割草機，但請讓它更具吸引力。'],a:'A',exp:'這反映了提示工程中的具體化 (Specificity) 原則。原始提示詞太抽象，選項 A 引入了「青草、鮮花、蜜蜂」等具象元素（Visual Metaphor），這些元素在心理學上與「生態系統」強烈掛鉤，能精確擊中環保意識消費者的痛點。與其說「我要環保」，不如給 AI 具體的視覺物件。'},
  {id:'26',type:'group',q:'Q26. AI 已生成一輛黑色野馬跑車圖像，你希望它看起來像鏡像方向（對稱）。下列哪些提示詞應該使用？正確為「O」，錯誤為「X」：',subs:[
    {q:'顛倒圖像。',a:'X'},
    {q:'水平鏡像圖像。',a:'O'},
    {q:'將汽車旋轉 180 度。',a:'X'}
  ],exp:'要讓汽車看起來像「對稱」的另一面，正確的操作是「水平鏡像（Horizontal Mirror）」，這會將物體左右對調。「顛倒（Flip Upside Down）」會讓輪胎朝天；「旋轉 180 度」則同時造成上下顛倒與左右對調，方向並不相同。'},
  {id:'27',q:'Q27. 你建立學校吉祥物（鬥牛犬）圖像，收到「學校裡友好的鬥牛犬」這種太過一般的輸出，需要更符合樂隊演奏會場景。應使用哪兩組提示詞？',opts:['A. 一隻友好的鬥牛犬穿著樂隊指揮服，戴著樂隊指揮帽，拿著指揮棒','B. 插圖中有一隻友好的鬥牛犬，穿著學校服樂隊服。正在演奏樂器，例如吹奏小號或薩克斯管','C. 顯示一隻友好的鬥牛犬坐在學校樂隊成員旁邊的觀眾席上。','D. 插圖中有一隻友好的鬥牛犬，穿著學校制服，站在學校前面。'],a:'A, B',exp:'當初始生成結果太過一般化時，需要透過迭代提示（Iterative Prompting）來增加細節層次。選項 A 與 B 透過增加「樂隊指揮服、指揮棒、小號、薩克斯管」等具體道具與服裝，將「鬥牛犬」與「樂隊演奏會」這個特定場景緊密結合，這就是所謂的語境堆疊（Contextual Layering）。'},
  {id:'28',q:'Q28. 學校 30 秒影片中，一名穿著亮綠色毛衣的學生從右側橫穿畫面，影片無法重拍。需從剪輯中刪除這名學生，同時盡可能保留原始內容。應使用哪個 AI 指示詞？',opts:['A. 讓影片中穿著亮綠色毛衣的學生以背景影片取代。','B. 從螢幕的左向右側剪掉穿著淺綠色毛衣的學生。','C. 更改影片的背景色，但不包括前景的該名學生。','D. 生成文字段落來覆蓋由左向右移動的學生，在文字段落中描述場景中發生的情況。'],a:'A',exp:'這題觸及了 AI 影片剪輯的核心技術：物件移除（Object Removal）與修復（In-painting）。選項 A 是最專業的作法，AI 會分析前後幀的像素，計算出學生身後的「背景」應該是什麼樣子，並用生成的背景取代，從而無縫修復畫面。剪掉區域會破壞構圖，用文字覆蓋則不符合「保留原始內容」的要求。'},
  {id:'29',type:'group',q:'Q29. 針對生成某品牌新款廚師機的產品正面評價影片，下列哪些提示詞是有效的？正確為「O」，錯誤為「X」：',subs:[
    {q:'製作一段 5 分鐘影片，詳細介紹某品牌新款廚師機。在影片中，應進行介紹、說明它易於使用和清洗並進行總結，鼓勵觀眾購買這款廚房用具。',a:'O'},
    {q:'製作有關新款廚師機的影片。在影片中，應討論其潛在用途，並鼓勵潛在買家購買這款廚師機。',a:'X'},
    {q:'製作廚師機的無偏見評價影片。',a:'X'}
  ],exp:'製作產品影片時，AI 需要的是「結構（Structure）」與「行動呼籲（CTA）」。第一個選項提供了具體長度（5 分鐘）與清晰的敘事流程（介紹➔易用性➔清洗➔購買），這是大綱式提示（Outline Prompting）的典範。第二個選項太籠統，第三個選項要求「無偏見」則與廣告推銷的目的衝突。'},
  {id:'30',type:'group',q:'Q30. 針對製作一段有動畫猴子角色按腳本表演的影片，下列哪些提示詞有助於實現目標？正確為「O」，錯誤為「X」：',subs:[
    {q:'製作一段 45 秒影片，其中有一隻猴子使用指定的腳本在太空中解釋複雜的太空概念。',a:'O'},
    {q:'製作一段 45 秒影片，使用動畫技術讓一隻猴子在太空中念劇本。',a:'X'},
    {q:'製作一段 45 秒影片，讓猴子當宇航員，並使用高級文本轉語音軟體，讓它念一段關於太空的腳本。',a:'X'}
  ],exp:'要讓動畫角色按腳本表演，提示詞必須定義「角色設定 + 任務環境 + 輸入源」。第一個選項結合了時間（45 秒）、角色（猴子）、具體腳本執行以及獨特的環境背景（太空），給予了 AI 完整的約束條件。其他選項雖然提到了元素，但缺乏將「腳本內容」與「角色表演」整合的具體指令。'},
  {id:'31',q:'Q31. 你向 AI 發出「制定快速鍛鍊計畫」，結果僅生成約 10 分鐘且強度不明的方案。若要讓訓練計畫符合 30 分鐘力量訓練目標，接下來應使用哪個提示詞？',opts:['A. 按照 30 分鐘的力量訓練進行修改。','B. 更精細一些。','C. 說明如何通過 30 分鐘的力量訓練提升身體素質。','D. 增加更多輸出。'],a:'A',exp:'這題反映了提示詞的迭代細化（Iterative Refinement）。面對不滿意的初步結果，最有效的方法是「明確定義變數」。選項 A 直接修正了兩個核心參數：時間長度（Duration, 30分鐘）與訓練類型（Modality, 力量訓練）。這比選項 B 的模糊指令或選項 C 的詢問原理更能直接導向可執行的結果。'},
  {id:'32',type:'group',q:'Q32. 你打算使用生成式 AI 為能在 iOS 和 Android 上執行的應用程式生成程式碼。針對每個敘述，你是否應該使用提示詞？應該為「O」，否則為「X」：',subs:[
    {q:'建立一個具備三個頁面的應用程式：主頁、關於和聯繫方式。',a:'X'},
    {q:'向我展示具有三個頁面（主頁、關於和聯繫方式）的 Android 和 iOS 應用程式在我的設備上的顯示效果。',a:'X'},
    {q:'編寫程式碼以建立一個具有三個頁面的應用程式，分別是主頁、關於和聯繫方式。該應用程式應該能在 Android 和 iOS 上執行。',a:'O'}
  ],exp:'這題考驗對 AI 能力邊界的理解。AI 無法直接在你的硬體上「建立」或「展示執行效果」（選項 1, 2），它只能產出「程式碼」（數位資產）。因此，正確的指令是要求 AI「編寫程式碼」（選項 3），然後再由人類開發者進行編譯與部署。'},
  {id:'33',q:'Q33. 你剛剛與團隊一起參加了工作會議，需要建立一份精簡的摘要，記錄會議中討論的每個要點。可以選擇哪兩個提示詞生成摘要？',opts:['A. 列出上次會議的所有行動事項和後續任務','B. 僅摘錄本次會議的必要資訊和決定','C. 為此會議記錄設定格式','D. 簡要回顧此次會議的目的'],a:'B, D',exp:'高品質的會議摘要取決於「資訊密度」與「上下文框架」。選項 B 聚焦於「決策（Decisions）」與必要資訊，這是商務摘要的核心；選項 D 提供了會議的「目的回顧」，確立了摘要的背景（Context）。選項 A 僅關注後續任務，選項 C 僅是格式調整，均不足以構成完整的內容摘要。'},
  {id:'34',type:'group',q:'Q34. 一位社會科學家準備一個龐大的房屋資料集。識別所需的標頭標籤，以用於完成各項分析工作。將每個分析目標配對正確的欄位標籤：',subs:[
    {q:'確定每種社區類型中年份最新的房產',options:['A. 建造年份、社區類型','B. 臥室數量、衛浴數量、面積、區域','C. 區域、總價、面積','D. 區域、總價、臥室數量、建造年份'],a:'A'},
    {q:'確定房屋大小、房屋數量與區域之間的相關性',options:['A. 建造年份、社區類型','B. 臥室數量、衛浴數量、面積、區域','C. 區域、總價、面積','D. 區域、總價、臥室數量、建造年份'],a:'B'},
    {q:'查找每個區域的每平方米平均價格',options:['A. 建造年份、社區類型','B. 臥室數量、衛浴數量、面積、區域','C. 區域、總價、面積','D. 區域、總價、臥室數量、建造年份'],a:'C'},
    {q:'假設市中心有一套 2020 年建成的三房住宅，預測它的價格',options:['A. 建造年份、社區類型','B. 臥室數量、衛浴數量、面積、區域','C. 區域、總價、面積','D. 區域、總價、臥室數量、建造年份'],a:'D'}
  ],exp:'這題是資料科學的前置作業，測試是否能將「分析目標」對應到正確的「資料欄位（Schema）」：\n1. 最新房產 → 需要「建造年份」與分類用的「社區類型」。\n2. 空間相關性 → 需要「面積」、「臥室/衛浴數量」與「區域」。\n3. 平均單價 → 需要「總價」除以「面積」，並按「區域」分組。\n4. 價格預測 → 需要所有影響價格的特徵向量（區域、臥室數、年份）作為模型輸入。'},
  {id:'35',q:'Q35. 你要建立一個美食社群來展示你的烹飪技術，想使用 AI 創作一篇貼文。哪個提示詞將生成或可用於建立該貼文的輸出？',opts:['A. 寫一個介紹性的社群貼文，介紹我對美食的熱愛以及啟發我建立這個社群帳號的因素。在文章中包括我最喜歡的菜餚和烹飪風格。','B. 分享一個詳細的食譜，其中包含步驟說明和生動的圖像。重點突顯出使用的任何獨特配料或烹飪技巧。','C. 分享拍攝美食照片的技巧。討論可增強美食呈現效果的燈光、角度和道具。','D. 記錄人們可以在我的城市中進行的美食之旅。介紹該城市著名的當地特色美食和風味。'],a:'A',exp:'經營美食社群的核心在於「個人敘事」與「品牌人設（Persona）」。選項 A 建立了創作者的品牌故事與情感連結，讓受眾認識你這個人，是發展社群帳號最重要的第一步。選項 C 是攝影教學，選項 D 是旅遊導覽，均偏離了「展示烹飪技術」的核心目標。'},
  {id:'36',q:'Q36. 你要成立一家名為 Healthy Eats 的小型食品企業，希望在商標 Logo 中包含公司名稱、粉色和綠色以及草莓圖片。哪兩個提示詞最有可能提供符合這些標準的商標 Logo？',opts:['A. 名叫 Healthy Eats 公司的小型企業商標 Logo，使用粉色和綠色文字以及草莓圖片。','B. 製作一個以草莓為主題的商業商標 Logo，以強調健康飲食。在商標中包括公司名稱 Healthy Eats','C. 我想為一家小型企業製作商標 Logo，這家企業名叫 Healthy Eats，文字應為粉紅色和綠色。並且商標 Logo 中應包含草莓圖片。','D. 為我的公司設計一個商標，使用粉色和綠色作為配色方案，並在商標上放置一顆草莓。','E. 為我的小型企業 Healthy Eats 設計一個富有創意的商標 Logo，使用粉色和綠色以及草莓圖片，並反映出我的企業價值觀。'],a:'A, C',exp:'高品質的圖像生成提示詞必須包含：名稱、色彩空間、物件元素。選項 A 與 C 最優，因為它們明確列出了所有硬性需求：品牌名（Healthy Eats）、特定顏色（粉色/綠色文字）、具象圖案（草莓）。若不指定顏色應用於文字，AI 常會隨機分配顏色。'},
  {id:'37',q:'Q37. 你正在寫一部小說，打算生成一些封面草圖。要獲取最有用的輸出，你應該在提示詞中包含哪些項目？',opts:['A. 書名、主題、背景、所需的藝術風格以及封面圖應包含內容的概述','B. 人物姓名、書名、作者姓名和藝術家姓名','C. 藝術家提供的插圖範例、書名和頁數','D. 插圖尺寸、書名、書的主題和商標藝術家的姓名'],a:'A',exp:'給予 AI（或人類藝術家）的創意簡報（Creative Brief）必須包含視覺構成要素。選項 A 涵蓋了書名（文字元素）、主題與背景（內容敘事）、藝術風格（視覺基調）。單純的人物姓名、頁數或插圖尺寸對於構建一個吸引人的封面幫助甚微，封面的靈魂在於氛圍與佈局。'},
  {id:'38',type:'group',q:'Q38. 針對發給生成式 AI 的下列每個提示詞，人工智慧（AI）會為「O」，不會為「X」：',subs:[
    {q:'瞭解商標 Logo 的檔案格式。',a:'X'},
    {q:'將房屋的草圖轉換為具有很強真實感的表示形式。',a:'O'},
    {q:'修改度假照片的中繼資料，以更改其位置和日期。',a:'X'}
  ],exp:'這題區分了「創意生成」與「系統管理」。AI 可以進行 Image-to-Image 轉化（將草圖變真實），這是擴散模型的強項。但 AI（特別是 LLM）無法「理解」檔案格式（這是解析器的功能），也無法直接修改檔案的中繼資料（Metadata），因為這涉及作業系統層級的二進位檔案編輯權限。'},
  {id:'39',type:'group',q:'Q39. 針對為公司製作一份公益廣告（鼓勵大家勤洗手），下列做法在建立提示詞時是否應遵循？正確為「O」，錯誤為「X」：',subs:[
    {q:'需要特定場景、人物或操作時，請提供全面的視覺和敘述性描述。',a:'O'},
    {q:'明確定義你的要求，例如指定影片類型、目標受眾和要點。',a:'O'},
    {q:'包括與影片相關的詳細背景資料、基調和風格。',a:'O'},
    {q:'假定人工智慧系統瞭解專案的一般背景，這樣就減少了提供詳細解釋的需求。',a:'X'},
    {q:'使用直白的語言，盡可能減少誤解。',a:'O'}
  ],exp:'這是提示工程的黃金法則：1. 具體化（提供視覺細節）；2. 明確化（定義受眾與類型）；3. 脈絡化（提供背景）；4. 顯性化（拒絕假設 AI 懂你，AI 沒有常識）；5. 簡潔化（直白語言）。選項 4 是最大的誤區，如果不提供詳細解釋，AI 只會根據機率隨機猜測。'},
  {id:'40',q:'Q40. 你要使用生成式 AI 將 PPT 簡報轉換為有關甜菜的具有專業性和教育性影片。哪個提示詞可達到預期結果？',opts:['A. 使用提供的簡報，製作一段有關甜菜的 2 分鐘影片。應採用正式場合口吻，在動畫中，應留出時間讓人讀出提供的文字。','B. 使用提供的簡報作為基礎，生成一段關於甜菜的 2 分鐘影片。影片應生動有趣，並包括 GIF 動畫和表情符號。','C. 查看簡報並確定有關甜菜的最佳資訊。使用這些資訊，生成一系列可在簡報中使用的新圖像。','D. 你是一名新聞播報員。使用簡報中的資訊，查找最近有關甜菜的新聞報導，並將其製作成影片。'],a:'A',exp:'要製作「專業且教育性」的影片，提示詞必須包含節奏控制（留出閱讀時間）與口吻設定（正式場合）。選項 A 完美符合這些要求。選項 B 過於娛樂化（表情符號），選項 D（新聞播報）偏離了教育初衷，選項 C 則是生成圖像而非影片。'},
  {id:'41',q:'Q41. 你發出了提示詞「公園裡有一隻快樂的狗」，輸出是一隻卡通狗。你希望這隻狗更加逼真，要採用復古風格且顏色應該很飽滿。哪個提示詞會提供更符合要求的輸出？',opts:['A. 運用鮮豔的色彩描繪城市公園裡有一隻快樂的狗的復古插圖。','B. 公園裡有一隻快樂的狗的彩色影像','C. 一隻快樂的狗坐在城市公園裡的 200x200 像素影像','D. 城市公園裡有一隻快樂的金毛獵犬的影像'],a:'A',exp:'這題考驗風格描述詞（Stylistic Descriptors）的運用。若要改變輸出風格，必須明確指定。選項 A 透過「復古插圖（Vintage Illustration）」定義了視覺基調，並以「鮮豔色彩（Vivid Colors）」滿足了飽滿度的需求。其他選項缺乏對風格的具體約束，容易導致 AI 回退到預設的卡通或一般風格。'}
];

function renderOptions(opts, correctAns) {
  if (!opts) return '';
  const correctArr = correctAns.split(',').map(s=>s.trim().charAt(0));
  return opts.map(opt => {
    const letter = opt.trim().charAt(0);
    const isCorrect = correctArr.includes(letter);
    return `<div class="opt ${isCorrect?'correct':'wrong'}">
      <span class="opt-mark">${isCorrect?'✓':'·'}</span>
      <span class="opt-text">${opt}</span>
    </div>`;
  }).join('');
}

function renderSubs(subs) {
  return subs.map(s => `<div class="sub-q">
    <div class="sub-q-text">${s.q}</div>
    <div class="sub-opts">
      ${(s.options||['O','X']).map(o=>`<span class="sub-opt ${o===s.a||o.trim().charAt(0)===s.a?'correct':''}">${o} ${o===s.a||o.trim().charAt(0)===s.a?'✓':''}</span>`).join('')}
    </div>
    ${s.explanation?`<div style="font-size:.75rem;color:var(--c-muted);margin-top:6px;">${s.explanation}</div>`:''}
  </div>`).join('');
}

const container = document.getElementById('quizBody');
container.innerHTML = QUESTIONS.map((q,i) => `
  <div class="q-item" id="qi-${i}">
    <div class="q-header" onclick="toggle(${i})">
      <span class="q-num">${q.id}</span>
      <span class="q-text">${q.q}</span>
      <span class="q-toggle">▼</span>
    </div>
    <div class="q-body">
      ${q.type==='group' ? renderSubs(q.subs) : renderOptions(q.opts||[],q.a||'')}
      <div class="answer-badge">✓ 正確答案：${q.a||'見各子題'}</div>
      <div class="explanation">${q.exp}</div>
    </div>
  </div>
`).join('');

function toggle(i) {
  const el = document.getElementById('qi-'+i);
  el.classList.toggle('open');
}
</script>
