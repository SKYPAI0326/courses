.explanation{background:var(--c-surface);border-left:3px solid var(--c-a1);border-radius:0 var(--radius) var(--radius) 0;padding:16px 18px;font-size:.85rem;line-height:1.85;color:var(--c-text);white-space:pre-line;}

.section-divider{display:flex;align-items:center;gap:12px;margin:32px 0 16px;}
.sd-label{font-size:.68rem;color:var(--c-a1);font-weight:700;letter-spacing:1.5px;white-space:nowrap;}
.sd-line{flex:1;height:1px;background:rgba(107,127,163,.2);}

.nav-btn:hover{border-color:var(--c-a1);}
.nav-btn.next{justify-content:flex-end;text-align:right;}

.footer{border-top:1px solid var(--c-border);padding:24px 48px;display:flex;align-items:center;gap:16px;}
.footer-logo{font-family:'Shippori Mincho',serif;font-size:.9rem;font-weight:700;color:var(--c-muted);}
.footer-note{font-size:.75rem;color:var(--c-muted);}

@media(max-width:768px){.topbar{padding:0 16px;}.topbar-sub,.topbar-divider{display:none;}.page-hero{padding:40px 20px 36px;}.quiz-body{padding:0 16px 60px;}.q-body{padding:16px;}.lesson-nav{padding:0 16px 60px;flex-direction:column;}.footer{padding:20px;}}

<script>
const fill = document.getElementById('progressFill');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = h.scrollTop / (h.scrollHeight - h.clientHeight) * 100;
  fill.style.width = Math.min(pct, 100) + '%';
});

const QUESTIONS = [
  {id:'1',type:'group',q:'Q1. 下列關於生成式 AI 的敘述，正確為「O」，錯誤為「X」：',subs:[{q:'生成式 AI 僅根據搜尋條件提供結果清單。',a:'X'},{q:'生成式 AI 使用神經網路來建立輸出。',a:'O'},{q:'生成式 AI 可以建立文字、圖像和語音等新內容。',a:'O'}],exp:'傳統搜尋引擎只索引既有內容；生成式 AI 底層是神經網路，能從無到有產出文字、圖像、程式碼。'},
  {id:'2',q:'Q2. 你正在研究一系列資料，想要估算出 2200 年地球上的平均溫度。哪種類型的人工智慧最適合執行此任務？',opts:['A. 預測式 AI (Predictive AI)','B. 鑑別式 AI (Discriminative AI)','C. 擴散式 AI (Diffusion AI)','D. 變分自動編碼器 (VAE)'],a:'A',exp:'預測式 AI 專門用來估算未來趨勢，根據歷史氣候數據推算機率最高的未來數值。鑑別式用於分類；擴散式與 VAE 是圖像生成技術。'},
  {id:'3',q:'Q3. 關於訓練大型語言模型（LLM）的基本流程：①收集資料集 ②預處理和清理資料 ③準備要輸入的資料 ④微調超參數。正確的「理論設計順序」是？',opts:['A. 1→2→3→4（實務流程）','B. 4→3→2→1（理論流程）','C. 1→3→2→4','D. 4→3→1→2'],a:'B',exp:'從系統設計角度，必須先設定超參數（機器規格），再準備輸入架構，然後清理資料，最後收集並灌入資料集。這是「設計先於資料」的理論視角。'},
  {id:'4',q:'Q4. 作家想測試電影劇本在不同口音下的對話效果。應使用哪種 AI？',opts:['A. 基於文字生成語音（Text-to-Speech）','B. 基於文字生成文字','C. 基於語音生成文字','D. 基於影音生成圖片'],a:'A',exp:'將文字劇本具現化為「不同口音的聲音」，正是 TTS 的核心功能。現代 TTS 能模擬語速、情緒與地區口音。'},
  {id:'5',q:'Q5. 製作以「思念」為主題的海報，包含社區成員的引言與動物詳細資訊。哪兩種生成式輸出類型最有幫助？',opts:['A. 圖像和文字','B. 圖像和語音','C. 語音和影片','D. 文字和影片'],a:'A',exp:'引言是文字，動物資訊需要圖像呈現。靜態平面海報的核心是「圖文整合」，不需要語音或影片。'},
  {id:'6',q:'Q6. 你要建立客製化的 Microsoft Copilot 來完成特定任務。如何實現客製化？',opts:['A. 向聊天機器人輸入一個指令和資訊，讓它準備好執行特定任務。','B. 透過編寫一個電腦程式來指導。','C. 必須對整個大型語言模型進行再訓練。','D. 只有原公司才能生成。'],a:'A',exp:'客製化 Copilot 無需編寫程式碼，只需在設定介面輸入 Instructions（指令）與 Knowledge Base（知識庫），即可賦予 AI 專屬能力。這稱為「封裝提示詞」。'},
  {id:'7',q:'Q7. 你想創作融合莎士比亞和 J.K. 羅琳風格的新作品，可存取兩位作家的全集。如何建立程式實現此目標？',opts:['A. 使用包含兩者作品的 Transformer 模型並部署 GPT。','B. 對現有基於 Diffusion 的 GPT 進行微調。','C. 實施卷積神經網路進行分類。','D. 基於詞類相關的 AI 技術，開發確定性的演算法程式。'],a:'A',exp:'Transformer 架構的自注意力機制能捕捉文字間的長距離風格關聯。擴散模型用於圖像，CNN 擅長影像辨識，確定性演算法無法處理文學風格。'},
  {id:'8',q:'Q8. 你想為企業建立商標、商業計畫和使用宣言，希望使用現成的解決方案，不想自行建構。哪種 AI 平台最適合？',opts:['A. ChatGPT','B. Stable Diffusion','C. Azure AI Studio','D. Adobe Firefly'],a:'A',exp:'ChatGPT 整合了 DALL-E 3（商標圖像）與 GPT-4（商業計畫文案），是最完整的一站式現成解決方案。Azure 是開發者平台，Stable Diffusion 與 Adobe Firefly 主要用於圖像生成。'},
  {id:'9',type:'group',q:'Q9. 將正確的 AI 工具與它執行的特定任務進行配對：A.Adobe Express B.Azure AI Studio C.Canva D.ChatGPT',subs:[{q:'允許生成圖像和獨具風格的字體並發佈到社群媒體。',a:'A'},{q:'允許您關聯一系列 AI 來執行業務任務。',a:'B'},{q:'可用於建立設計、簡報和行銷素材。',a:'C'},{q:'可參與對話、回答問題或提供資訊。',a:'D'}],exp:'Adobe Express：社群圖像字體設計；Azure AI Studio：企業級多 AI 編排；Canva：設計與行銷素材；ChatGPT：全能對話 AI。'},
  {id:'10',type:'group',q:'Q10. 有關生成式 AI 的局限性敘述，正確為「O」，錯誤為「X」：',subs:[{q:'你可以假定輸入到任何 GPT 或 Copilot 中的機密資料將不會被用於訓練。',a:'X'},{q:'存在公認的標準，規定了如何在行業環境中使用生成式 AI 的輸出。',a:'X'},{q:'你需要對生成式 AI 工具輸出內容進行仔細事實審查，因為這些工具可能會編造內容。',a:'O'}],exp:'機密資料可能被用於訓練（X）；AI 輸出標準尚未統一（X）；幻覺（Hallucination）是 GenAI 天性，必須人工查核（O）。'},
  {id:'11',q:'Q11. 哪兩個選項準確提出生成式 AI 的特性？',opts:['A. 模型可以重新訓練，以便生成更符合預期目的的回覆','B. 生成式 AI 在生成回應時，會利用預測來對回覆中的每個詞進行概率性的選擇。','C. 生成式 AI 模型通常需特徵工程進行訓練','D. 模型會建構一個 A/B 二元分類器，以供搜索演算法遍歷。'],a:'A, B',exp:'GenAI 底層是機率預測（B），且可透過 Fine-tuning 或 RLHF 重新訓練對齊偏好（A）。特徵工程屬於傳統機器學習，二元分類器與 GenAI 無關。'},
  {id:'12',type:'group',q:'Q12. 下列描述屬於生成式 AI 為「O」，搜尋引擎為「X」：',subs:[{q:'能夠根據提示詞生成新的材料',a:'O'},{q:'能夠生成在任何網站上都找不到的材料',a:'O'},{q:'總是清楚地說明資訊在網路上的來源',a:'X'}],exp:'GenAI 能合成新內容（O，O）；清楚標示來源是搜尋引擎的特徵（X）。'},
  {id:'13',q:'Q13. 生成式 AI 為「生成一張桌子上擺放著一盞檯燈的圖像」所使用的流程順序：①使用雜訊生成隨機像素值 ②使用分詞解析 token ③使用擴散更改數值建立圖像 ④使用優化演算法使圖像更符合提示詞',opts:['A. 2→1→3→4','B. 1→2→3→4','C. 4→3→2→1','D. 2→3→1→4'],a:'A',exp:'潛在擴散模型流程：先分詞理解文字（2）→ 投射隨機雜訊（1）→ 擴散去噪讓圖像浮現（3）→ 優化輸出最終圖像（4）。'},
  {id:'14',q:'Q14. 廣告公司員工要為客戶廣告生成歌詞，客戶提供產品規格文件，你要求客戶再提供產品圖片。你可以在 ChatGPT 中使用哪些輸入類型？',opts:['A. 文件檔案、文字和圖像','B. 僅文件檔案和文字','C. 僅文字和圖像','D. 僅文字'],a:'A',exp:'ChatGPT 支援多模態輸入。文件（產品規格）+文字（創作方向）+圖像（視覺氛圍）三者組合能達成最佳創作效果。'},
  {id:'15',q:'Q15. 歌手向 AI 提交原創歌曲錄音，要求讓開頭部分聽起來有失真效果。使用了哪種 AI？',opts:['A. 基於語音生成語音（Speech-to-Speech）','B. 基於文字及語音生成文字','C. 基於文字生成語音（Text-to-Speech）','D. 基於文字生成文字'],a:'A',exp:'輸入是錄音（語音），輸出是帶失真效果的錄音（語音）。這是 Speech-to-Speech（S2S）——保留原旋律但改變音質特徵，類似 AI 混音工具。'},
  {id:'16',q:'Q16. 服裝設計師希望客戶根據三個問題的回答生成 T 恤設計，設計完成後自動提交給他。如何用生成式 AI 實現？',opts:['A. 建立客製化 GPT。','B. 輸入提示詞用以建構非互動式的網站。','C. 在他的網站上發佈指向 DALL-E 的連結。','D. 在他的網站上發佈指向 Adobe Firefly 的連結。'],a:'A',exp:'客製化 GPT（AI Agent）能透過對話收集需求，後台調用 DALL-E 生成設計，並透過 Actions（API）自動提交。單純發佈連結無法實現「自動提交」。'},
  {id:'17',q:'Q17. 你要製作輔導課業的 ChatGPT AI 工具，需要能對多個科目進行微調。哪種方法最有效？',opts:['A. 客製的基於變換器（custom transformer-based）的模型，其中針對每個科目提供了具體指令','B. 預設基於變換器（Transformer-based）的模型，其中針對每個科目提供了具體指令。','C. 客製的基於擴散（custom diffusion-based）的模型','D. 預設基於擴散（default diffusion-based）的模型'],a:'A',exp:'Transformer 模型具備強大泛化能力，透過 System Prompt 進行角色設定即可調整不同科目行為，無需從頭訓練（成本極高）。擴散模型用於圖像，不適合語言輔導。'},
  {id:'18',q:'Q18. 軟體團隊要開發自動執行貸款申請流程的應用，需執行三項獨立任務（獲取信用記錄、評分、發送通知）。哪種 AI 工具適合通過多代理人工分工推動合作開發？',opts:['A. LangChain','B. Adobe Firefly','C. Microsoft Copilot','D. Stable Diffusion'],a:'A',exp:'LangChain 是 AI 編排框架，專門設計多 Agent 協作流程，讓數據在不同工具間流轉。Firefly/Stable Diffusion 是圖像工具，Copilot 是終端產品，都不適合後端邏輯開發。'},
  {id:'19',type:'group',q:'Q19. 下列針對每個場景，結果可能為「O」，不可能為「X」：',subs:[{q:'你發出消除紅色的圖像提示詞，AI 生成了黑白圖像。',a:'O'},{q:'你用公開資訊的結構完善提示詞生成銷售簡報，結果包含未發佈的公司機密資訊。',a:'X'},{q:'你多次用相同提示詞要求時鐘圖，時鐘顯示的時間有時不一樣。',a:'O'}],exp:'1.否定指令處理較弱，AI 可能聚焦在「紅色」關鍵字，將畫面變黑白（O）。2.AI 不可能生成它從未見過的未發佈機密（X）。3.相同提示可能產生不同輸出，這是非確定性（Non-determinism）（O）。'}
];

function renderOptions(opts, correctAns) {
  if (!opts) return '';
  const correctArr = correctAns.split(',').map(s=>s.trim().charAt(0));
  return opts.map(opt => {
    const letter = opt.trim().charAt(0);
    const isCorrect = correctArr.includes(letter);
    return `<div class="opt ${isCorrect?'correct':'wrong'}">
      <span class="opt-mark">${isCorrect?'✓':'·'}</span>
      <span class="opt-text">${opt}</span>
    </div>`;
  }).join('');
}

function renderSubs(subs) {
  return subs.map(s => `<div class="sub-q">
    <div class="sub-q-text">${s.q}</div>
    <div class="sub-opts">
      ${(s.options||['O','X']).map(o=>`<span class="sub-opt ${o===s.a||o.trim().charAt(0)===s.a?'correct':''}">${o} ${o===s.a||o.trim().charAt(0)===s.a?'✓':''}</span>`).join('')}
    </div>
    ${s.explanation?`<div style="font-size:.75rem;color:var(--c-muted);margin-top:6px;">${s.explanation}</div>`:''}
  </div>`).join('');
}

const container = document.getElementById('quizBody');
container.innerHTML = QUESTIONS.map((q,i) => `
  <div class="q-item" id="qi-${i}">
    <div class="q-header" onclick="toggle(${i})">
      <span class="q-num">${q.id}</span>
      <span class="q-text">${q.q}</span>
      <span class="q-toggle">▼</span>
    </div>
    <div class="q-body">
      ${q.type==='group' ? renderSubs(q.subs) : renderOptions(q.opts||[],q.a||'')}
      <div class="answer-badge">✓ 正確答案：${q.a||'見各子題'}</div>
      <div class="explanation">${q.exp}</div>
    </div>
  </div>
`).join('');

function toggle(i) {
  const el = document.getElementById('qi-'+i);
  el.classList.toggle('open');
}
</script>

</html>
